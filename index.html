.pill {

}
.pill-weight { background: var(--warn-bg); color: var(--warn); }
.pill-reps { background: var(--success-bg); color: var(--success); }

.label {

h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; line-height: 1.2; }

.set-box {

// ═══════════════════════════════════════
// DATABASE (IndexedDB)
// ═══════════════════════════════════════
const DB_NAME = 'progressive-overload';
const DB_VERSION = 1;
const STORE = 'workouts';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        store.createIndex('workoutType', 'workoutType', { unique: false });
        store.createIndex('date', 'date', { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function getAllWorkouts() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const store = tx.objectStore(STORE);
    const req = store.index('date').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function addWorkout(workout) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).add(workout);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function deleteWorkout(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function clearAllWorkouts() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function formatTime(s) {
  if (s == null) return '—';
  const m = Math.floor(s / 60), sec = s % 60;
  return m > 0 ? `${m}m${sec > 0 ? sec.toString().padStart(2,'0') + 's' : ''}` : `${sec}s`;
}

function parseTimeInput(str) {
  str = str.trim().toLowerCase();
  let m;
  if ((m = str.match(/^(\d+)m\s*(\d+)s?$/))) return +m[1]*60 + +m[2];
  if ((m = str.match(/^(\d+):(\d+)$/))) return +m[1]*60 + +m[2];
  if ((m = str.match(/^(\d+)m$/))) return +m[1]*60;
  if ((m = str.match(/^(\d+)s?$/))) return +m[1];
  return null;
}

function fmtVal(v, type) {
  if (v == null) return '—';
  if (v === 'skip') return 'SKIP';
  return type === 'timed' ? formatTime(v) : String(v);
}

function getLastForType(history, type) {
  for (let i = history.length - 1; i >= 0; i--) if (history[i].workoutType === type) return history[i];
  return null;
}

function getExHistory(history, name) {
  const r = [];
  for (const w of history) for (const ex of w.exercises) if (ex.name === name) r.push({ date: w.date, ...ex });
  return r;
}

function dateLbl(iso) { const d = new Date(iso); return `${d.getMonth()+1}/${d.getDate()}`; }

function pillClass(type) { return type === 'weighted' ? 'pill-weight' : type === 'timed' ? 'pill-timed' : 'pill-reps'; }
function pillLabel(type) { return type === 'weighted' ? 'weight' : type === 'timed' ? 'timed' : 'reps'; }

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'htmlFor') el.setAttribute('for', v);
    else el.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') el.appendChild(document.createTextNode(c));
    else if (Array.isArray(c)) c.forEach(ch => ch && el.appendChild(ch));
    else el.appendChild(c);
  }
  return el;
}

// ═══════════════════════════════════════
// MINI CHART (canvas-based, no deps)
// ═══════════════════════════════════════
function drawChart(canvas, data, key, color, labels) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 10, right: 12, bottom: 24, left: 36 };
  const plotW = W - pad.left - pad.right, plotH = H - pad.top - pad.bottom;

  const vals = data.map(d => d[key]);
  const min = Math.min(...vals) * 0.85;
  const max = Math.max(...vals) * 1.1 || 1;

  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#272727'; ctx.lineWidth = 0.5;
  for (let i = 0; i < 4; i++) {
    const y = pad.top + (plotH / 3) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
  }

  // X labels
  ctx.fillStyle = '#6B6B6B'; ctx.font = '10px IBM Plex Mono';
  ctx.textAlign = 'center';
  data.forEach((d, i) => {
    const x = pad.left + (plotW / Math.max(data.length - 1, 1)) * i;
    ctx.fillText(labels[i], x, H - 4);
  });

  // Y labels
  ctx.textAlign = 'right';
  for (let i = 0; i < 4; i++) {
    const y = pad.top + (plotH / 3) * i;
    const val = max - ((max - min) / 3) * i;
    ctx.fillText(Math.round(val), pad.left - 6, y + 3);
  }

  if (data.length < 2) {
    // Single point
    const x = pad.left + plotW / 2;
    const y = pad.top + plotH / 2;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
    return;
  }

  // Line
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
  ctx.beginPath();
  data.forEach((d, i) => {
    const x = pad.left + (plotW / (data.length - 1)) * i;
    const y = pad.top + plotH - ((d[key] - min) / (max - min)) * plotH;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots
  ctx.fillStyle = color;
  data.forEach((d, i) => {
    const x = pad.left + (plotW / (data.length - 1)) * i;
    const y = pad.top + plotH - ((d[key] - min) / (max - min)) * plotH;
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
  });
}

  render();
}

const app = document.getElementById('app');

  app.innerHTML = '';

  switch (s.screen) {
    case 'loading': app.appendChild(renderLoading()); break;
    case 'home': app.appendChild(renderHome()); break;
    case 'selectType': app.appendChild(renderSelectType()); break;
    case 'editList': app.appendChild(renderEditList()); break;
    case 'logging': app.appendChild(renderLogging()); break;
    case 'review': app.appendChild(renderReview()); break;
    case 'progress': app.appendChild(renderProgress()); break;

}

function renderLoading() {

  // Last session card
  if (last) {
    const card = h('div', { className: 'card', style: { marginBottom: '24px' } });

    card.appendChild(h('div', { style: { fontSize: '15px', fontWeight: 700 } }, last.workoutType));
    const d = new Date(last.date);
    card.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-muted)', marginTop: '2px' } },
      `${d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })} · ${last.exercises.length} exercises`));
    if (last.notes) {
      card.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-dim)', marginTop: '6px', fontStyle: 'italic', borderTop: '1px solid var(--border)', paddingTop: '6px' } }, `"${last.notes}"`));
    }
    card.appendChild(h('div', { style: { fontSize: '10px', color: 'var(--text-subtle)', marginTop: '6px' } },
      `${state.history.length} total workout${state.history.length !== 1 ? 's' : ''} logged`));
    frag.appendChild(card);
  }

  const btns = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px' } });
  btns.appendChild(h('button', { className: 'btn btn-primary', onClick: () => setState({ screen: 'selectType' }) }, '▶ LOG WORKOUT'));
  const progBtn = h('button', { className: 'btn btn-secondary', onClick: () => setState({ screen: 'progress', progressFilter: null, progressSelected: null }) }, '📊 VIEW PROGRESS');
  if (state.history.length === 0) { progBtn.disabled = true; }
  btns.appendChild(progBtn);
  frag.appendChild(btns);

  return frag;
}

// ─── SELECT TYPE ───
function renderSelectType() {
  const frag = h('div', { className: 'fade-in' });
  frag.appendChild(h('button', { className: 'back-btn', onClick: () => setState({ screen: 'home' }) }, '← back'));
  frag.appendChild(h('h1', null, 'Select Workout'));
  frag.appendChild(h('p', { style: { color: 'var(--text-muted)', fontSize: '11px', margin: '4px 0 20px' } }, 'What are we hitting today?'));

  // Sort types: least recently done first (never done → top)
  const types = Object.keys(TEMPLATES).sort((a, b) => {
    const lastA = getLastForType(state.history, a);
    const lastB = getLastForType(state.history, b);
    if (!lastA && !lastB) return 0;
    if (!lastA) return -1;
    if (!lastB) return 1;
    return new Date(lastA.date) - new Date(lastB.date);
  });

  const list = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px' } });
  for (const type of types) {
    const last = getLastForType(state.history, type);
    const card = h('button', { className: 'card card-btn', onClick: () => {
      const exList = last ? last.exercises.map(e => ({ name: e.name, type: e.type })) : TEMPLATES[type];
      setState({ screen: 'editList', workoutType: type, exerciseList: JSON.parse(JSON.stringify(exList)) });
    }});
    card.appendChild(h('div', { style: { fontSize: '16px', fontWeight: 800, letterSpacing: '-0.3px', color: 'var(--text)' } }, type));
    card.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-muted)', marginTop: '3px' } },
      last ? `Last: ${new Date(last.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} · ${last.exercises.length} exercises` : 'No sessions yet'));
    if (last?.notes) card.appendChild(h('div', { style: { fontSize: '10px', color: 'var(--text-dim)', marginTop: '4px', fontStyle: 'italic' } }, `"${last.notes}"`));
    list.appendChild(card);
  }
  frag.appendChild(list);
  return frag;
}

    note.appendChild(h('div', { style: { fontSize: '12px', color: 'var(--text)' } }, last.notes));
    frag.appendChild(note);
  }

  // Exercise list
  const listEl = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '5px', marginBottom: '14px' } });
  state.exerciseList.forEach((ex, i) => {
    const row = h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '8px', padding: '10px 12px' } });
    const left = h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', flex: 1, minWidth: 0 } });
    left.appendChild(h('span', { style: { fontSize: '11px', color: 'var(--text-subtle)', width: '16px', flexShrink: 0 } }, String(i + 1)));
    left.appendChild(h('span', { style: { fontSize: '13px', fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: 'var(--text)' } }, ex.name));
    left.appendChild(h('span', { className: `pill ${pillClass(ex.type)}` }, pillLabel(ex.type)));
    row.appendChild(left);

    const controls = h('div', { style: { display: 'flex', gap: '2px', flexShrink: 0 } });
    controls.appendChild(h('button', { style: { background: 'none', border: 'none', color: i === 0 ? 'var(--text-subtle)' : 'var(--text-muted)', fontSize: '11px', padding: '2px 4px', fontFamily: 'var(--font)' },
      onClick: () => { if (i > 0) { const l = [...state.exerciseList]; [l[i-1], l[i]] = [l[i], l[i-1]]; setState({ exerciseList: l }); } } }, '↑'));
    controls.appendChild(h('button', { style: { background: 'none', border: 'none', color: i === state.exerciseList.length - 1 ? 'var(--text-subtle)' : 'var(--text-muted)', fontSize: '11px', padding: '2px 4px', fontFamily: 'var(--font)' },
      onClick: () => { if (i < state.exerciseList.length - 1) { const l = [...state.exerciseList]; [l[i], l[i+1]] = [l[i+1], l[i]]; setState({ exerciseList: l }); } } }, '↓'));
    controls.appendChild(h('button', { style: { background: 'none', border: 'none', color: 'var(--text-dim)', fontSize: '14px', padding: '2px 6px', fontFamily: 'var(--font)' },
      onClick: () => setState({ exerciseList: state.exerciseList.filter((_, j) => j !== i) }) }, '×'));
    row.appendChild(controls);
    listEl.appendChild(row);
  });
  frag.appendChild(listEl);

  // Add exercise
  const addBtn = h('button', { className: 'btn btn-secondary', style: { marginBottom: '14px' }, onClick: () => {
    const name = prompt('Exercise name:');
    if (!name?.trim()) return;
    const typeChoice = prompt('Type: weighted, reps, or timed', 'weighted');
    const type = ['weighted', 'reps', 'timed'].includes(typeChoice) ? typeChoice : 'weighted';
    setState({ exerciseList: [...state.exerciseList, { name: name.trim(), type }] });
  }}, '+ Add Exercise');
  frag.appendChild(addBtn);

  // Start
  const startBtn = h('button', { className: 'btn btn-primary', onClick: () => {
    setState({
      screen: 'logging', exIdx: 0, setIdx: 0, weight: '', weightUnit: 'lbs', weightConfirmed: false, inputVal: '',
      results: state.exerciseList.map(ex => ({ name: ex.name, type: ex.type, weight: null, weightUnit: null, sets: [] }))
    });
  }}, `START (${state.exerciseList.length} exercises) →`);
  if (state.exerciseList.length === 0) startBtn.disabled = true;
  frag.appendChild(startBtn);

  return frag;
}

// ─── LOGGING ───
function renderLogging() {
  const { exerciseList, exIdx, setIdx, results, weight, weightUnit, weightConfirmed, inputVal, history } = state;
  const ex = exerciseList[exIdx];
  const result = results[exIdx];
  const isWeighted = ex.type === 'weighted';
  const isTimed = ex.type === 'timed';

  const hist = getExHistory(history, ex.name);
  const lastData = hist.length > 0 ? hist[hist.length - 1] : null;
  const lastSets = lastData?.sets || [];
  const needsWeight = isWeighted && !weightConfirmed && result.sets.length === 0;

  const progress = ((exIdx * DEFAULT_SETS + setIdx) / (exerciseList.length * DEFAULT_SETS)) * 100;

  const frag = h('div', { className: 'fade-in' });

  // Progress bar
  const pbar = h('div', { className: 'progress-bar' });
  pbar.appendChild(h('div', { className: 'progress-bar-fill', style: { width: progress + '%' } }));
  frag.appendChild(pbar);

  // Top row: back + undo
  const topRow = h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' } });
  topRow.appendChild(h('button', { className: 'back-btn', style: { margin: 0 }, onClick: () => setState({ screen: 'editList' }) }, '← back'));
  const canUndo = result.sets.length > 0 || (weightConfirmed && result.sets.length === 0) || exIdx > 0;
  if (canUndo) {
    topRow.appendChild(h('button', {
      style: { background: 'none', border: 'none', color: 'var(--text-muted)', fontSize: '11px', fontFamily: 'var(--font)', padding: '4px 0', cursor: 'pointer' },
      onClick: undoAction
    }, '↩ undo'));
  }
  frag.appendChild(topRow);

  frag.appendChild(h('h1', null, ex.name));
  frag.appendChild(h('p', { style: { color: 'var(--text-muted)', fontSize: '11px', margin: '4px 0 16px' } }, `Exercise ${exIdx + 1} of ${exerciseList.length}`));

  // Badges
  const badges = h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '16px' } });
  badges.appendChild(h('span', { className: `pill ${pillClass(ex.type)}` }, pillLabel(ex.type)));
  if (result.weight) badges.appendChild(h('span', { className: 'pill pill-weight' }, `${result.weight} ${result.weightUnit}`));
  frag.appendChild(badges);

  // Last time overview
  if (lastSets.length > 0) {
    const lastBox = h('div', { style: { background: 'var(--surface-alt)', border: '1px solid var(--border)', borderRadius: '8px', padding: '10px 12px', marginBottom: '14px' } });
    lastBox.appendChild(h('div', { className: 'label' }, `last time${lastData?.weight ? ` · ${lastData.weight} ${lastData.weightUnit || 'lbs'}` : ''}`));
    const setsRow = h('div', { style: { display: 'flex', gap: '8px' } });
    lastSets.forEach((s, i) => {
      const cls = i === setIdx ? 'set-box set-box-active' : 'set-box';
      const box = h('div', { className: cls });
      box.appendChild(h('div', { style: { fontSize: '14px', fontWeight: 700, color: i === setIdx ? 'var(--accent)' : 'var(--text-muted)' } }, fmtVal(s, ex.type)));
      box.appendChild(h('div', { style: { fontSize: '9px', color: 'var(--text-dim)', marginTop: '1px' } }, `Set ${i + 1}`));
      setsRow.appendChild(box);
    });
    lastBox.appendChild(setsRow);
    frag.appendChild(lastBox);
  }

  // Current sets (with +/- delta)
  if (result.sets.length > 0) {
    const curBox = h('div', { style: { marginBottom: '12px' } });
    curBox.appendChild(h('div', { className: 'label' }, 'this time'));
    const setsRow = h('div', { style: { display: 'flex', gap: '6px' } });
    result.sets.forEach((s, i) => {
      const cls = s === 'skip' ? 'set-box set-box-skip' : 'set-box set-box-done';
      const box = h('div', { className: cls });
      box.appendChild(h('div', { style: { fontSize: '14px', fontWeight: 700, color: s === 'skip' ? 'var(--warn)' : 'var(--success)' } }, fmtVal(s, ex.type)));
      box.appendChild(h('div', { style: { fontSize: '9px', color: 'var(--text-dim)', marginTop: '1px' } }, `Set ${i + 1}`));

      // +/- delta vs last session
      const lastVal = lastSets[i];
      if (typeof s === 'number' && typeof lastVal === 'number') {
        const delta = s - lastVal;
        const deltaColor = delta > 0 ? 'var(--success)' : delta < 0 ? 'var(--danger)' : 'var(--text-subtle)';
        const deltaText = delta > 0 ? `+${delta}` : delta === 0 ? '=' : String(delta);
        box.appendChild(h('div', { style: { fontSize: '9px', color: deltaColor, marginTop: '1px', fontWeight: 700 } }, deltaText));
      }

      setsRow.appendChild(box);
    });
    curBox.appendChild(setsRow);
    frag.appendChild(curBox);
  }

  if (needsWeight) {
    frag.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-muted)', marginBottom: '6px' } },
      `Weight${lastData?.weight ? ` (last: ${lastData.weight} ${lastData.weightUnit || 'lbs'})` : ''}`));
    const row = h('div', { style: { display: 'flex', gap: '8px', marginBottom: '12px' } });
    const inp = h('input', { className: 'input', type: 'number', inputMode: 'numeric', placeholder: 'Weight',
      value: lastData?.weight ? String(lastData.weight) : '',
      style: { flex: 1 } });
    inp.addEventListener('input', (e) => { state.weight = e.target.value; });
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmWeightAction(); });
    if (lastData?.weight) state.weight = String(lastData.weight);
    if (lastData?.weightUnit) state.weightUnit = lastData.weightUnit;
    row.appendChild(inp);

    const unitToggle = h('div', { style: { display: 'flex', borderRadius: '8px', overflow: 'hidden', border: '1px solid var(--border)' } });
    ['lbs', 'kg'].forEach(u => {
      unitToggle.appendChild(h('button', {
        style: { padding: '8px 12px', background: state.weightUnit === u ? '#CDFF5025' : 'var(--surface)', color: state.weightUnit === u ? 'var(--accent)' : 'var(--text-muted)', border: 'none', fontSize: '12px', fontWeight: 700, fontFamily: 'var(--font)' },
        onClick: () => { state.weightUnit = u; render(); }
      }, u));
    });
    row.appendChild(unitToggle);
    frag.appendChild(row);

    frag.appendChild(h('button', { className: 'btn btn-primary', onClick: confirmWeightAction }, 'CONFIRM WEIGHT →'));
    setTimeout(() => inp.focus(), 50);
  } else {
    frag.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-muted)', marginBottom: '6px' } }, `Set ${setIdx + 1} of ${DEFAULT_SETS}`));
    const inp = h('input', { className: 'input', type: isTimed ? 'text' : 'number',
      inputMode: isTimed ? 'text' : 'numeric',
      placeholder: isTimed ? 'e.g. 1m15s or 75' : 'Reps',
      style: { marginBottom: '10px' } });
    inp.addEventListener('input', (e) => { state.inputVal = e.target.value; });
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter' && state.inputVal) logSetAction(); });
    frag.appendChild(inp);

    const btns = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '6px' } });
    btns.appendChild(h('button', { className: 'btn btn-primary', onClick: logSetAction }, `LOG SET ${setIdx + 1} →`));
    const row2 = h('div', { style: { display: 'flex', gap: '6px' } });
    row2.appendChild(h('button', { className: 'btn btn-skip', style: { flex: 1 }, onClick: skipSetAction }, 'SKIP SET'));
    if (result.sets.length > 0) {
      row2.appendChild(h('button', { className: 'btn btn-ghost', style: { flex: 1, fontSize: '11px' }, onClick: finishEarlyAction }, 'Done with exercise →'));
    }
    btns.appendChild(row2);
    frag.appendChild(btns);
    setTimeout(() => inp.focus(), 50);
  }

  // Coming up next
  if (exIdx + 1 < exerciseList.length) {
    const nextEx = exerciseList[exIdx + 1];
    const nextHist = getExHistory(history, nextEx.name);
    const nextLast = nextHist.length > 0 ? nextHist[nextHist.length - 1] : null;

    const nextCard = h('div', { style: {
      marginTop: '24px',
      background: 'var(--surface)',
      border: '1px solid var(--border)',
      borderRadius: '8px',
      padding: '10px 12px',
      opacity: '0.75',
    }});
    nextCard.appendChild(h('div', { className: 'label', style: { marginBottom: '4px' } }, 'coming up next'));

    const nameRow = h('div', { style: { display: 'flex', alignItems: 'center', gap: '6px' } });
    nameRow.appendChild(h('span', { style: { fontSize: '13px', fontWeight: 700, color: 'var(--text)' } }, nextEx.name));
    nameRow.appendChild(h('span', { className: `pill ${pillClass(nextEx.type)}` }, pillLabel(nextEx.type)));
    nextCard.appendChild(nameRow);

    if (nextLast) {
      const parts = [];
      if (nextLast.weight) parts.push(`${nextLast.weight} ${nextLast.weightUnit || 'lbs'}`);
      if (nextLast.sets?.length) parts.push(nextLast.sets.map(s => fmtVal(s, nextEx.type)).join(' / '));
      if (parts.length > 0) {
        nextCard.appendChild(h('div', { style: { fontSize: '10px', color: 'var(--text-dim)', marginTop: '3px' } }, parts.join(' · ')));
      }
    } else {
      nextCard.appendChild(h('div', { style: { fontSize: '10px', color: 'var(--text-subtle)', marginTop: '3px' } }, 'no previous data'));
    }

    frag.appendChild(nextCard);
  }

  return frag;
}

function confirmWeightAction() {
  const w = parseFloat(state.weight);
  if (isNaN(w) || w <= 0) return;
  const results = [...state.results];
  results[state.exIdx] = { ...results[state.exIdx], weight: w, weightUnit: state.weightUnit };
  setState({ results, weightConfirmed: true });
}

function logSetAction() {
  const { exIdx, setIdx, inputVal, exerciseList, results } = state;
  const ex = exerciseList[exIdx];
  let value;
  if (ex.type === 'timed') { value = parseTimeInput(inputVal); if (value === null) return; }
  else { value = parseInt(inputVal); if (isNaN(value) || value <= 0) return; }

  const newResults = JSON.parse(JSON.stringify(results));
  newResults[exIdx].sets.push(value);

  if (setIdx + 1 < DEFAULT_SETS) {
    setState({ results: newResults, setIdx: setIdx + 1, inputVal: '' });
  } else {
    advanceExercise(newResults);
  }
}

function skipSetAction() {
  const newResults = JSON.parse(JSON.stringify(state.results));
  newResults[state.exIdx].sets.push('skip');
  if (state.setIdx + 1 < DEFAULT_SETS) {
    setState({ results: newResults, setIdx: state.setIdx + 1, inputVal: '' });
  } else {
    advanceExercise(newResults);
  }
}

function finishEarlyAction() { advanceExercise(state.results); }

function advanceExercise(results) {
  if (state.exIdx + 1 < state.exerciseList.length) {
    setState({ results, exIdx: state.exIdx + 1, setIdx: 0, weight: '', weightUnit: 'lbs', weightConfirmed: false, inputVal: '' });
  } else {
    setState({ results, screen: 'review', notes: '' });
  }
}

function undoAction() {
  const { exIdx, results, exerciseList } = state;
  const result = results[exIdx];

  // If weight was confirmed but no sets logged yet, un-confirm weight
  if (state.weightConfirmed && result.sets.length === 0) {
    setState({ weightConfirmed: false });
    return;
  }

  // If current exercise has logged sets, pop the last one
  if (result.sets.length > 0) {
    const newResults = JSON.parse(JSON.stringify(results));
    newResults[exIdx].sets.pop();
    const newSetIdx = newResults[exIdx].sets.length;
    setState({ results: newResults, setIdx: newSetIdx, inputVal: '' });
    return;
  }

  // No sets logged for current exercise, go back to previous exercise
  if (exIdx > 0) {
    const newResults = JSON.parse(JSON.stringify(results));
    if (newResults[exIdx - 1].sets.length > 0) {
      newResults[exIdx - 1].sets.pop();
    }
    const prevSets = newResults[exIdx - 1].sets;
    const prevEx = exerciseList[exIdx - 1];
    setState({
      results: newResults,
      exIdx: exIdx - 1,
      setIdx: prevSets.length,
      inputVal: '',
      weightConfirmed: prevEx.type !== 'weighted' || newResults[exIdx - 1].weight != null,
    });
    return;
  }

  // First exercise with no sets, go back to edit list
  setState({ screen: 'editList' });
}

// ─── REVIEW ───
function renderReview() {
  const frag = h('div', { className: 'fade-in' });
  frag.appendChild(h('button', { className: 'back-btn', onClick: () => setState({ screen: 'logging' }) }, '← back'));
  frag.appendChild(h('h1', null, 'Review'));
  frag.appendChild(h('p', { style: { color: 'var(--text-muted)', fontSize: '11px', margin: '4px 0 20px' } }, `${state.workoutType} — confirm your entries`));

  const list = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '16px' } });
  state.results.forEach((ex, eIdx) => {
    // Get last session data for delta comparison
    const hist = getExHistory(state.history, ex.name);
    const lastData = hist.length > 0 ? hist[hist.length - 1] : null;
    const lastSets = lastData?.sets || [];

    const card = h('div', { className: 'card', style: { padding: '12px' } });
    const header = h('div', { style: { display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '8px', flexWrap: 'wrap' } });
    header.appendChild(h('span', { style: { fontSize: '13px', fontWeight: 700, color: 'var(--text)' } }, ex.name));
    header.appendChild(h('span', { className: `pill ${pillClass(ex.type)}` }, pillLabel(ex.type)));
    if (ex.weight) header.appendChild(h('span', { style: { fontSize: '10px', color: 'var(--text-muted)' } }, `@ ${ex.weight} ${ex.weightUnit}`));
    card.appendChild(header);

    const setsRow = h('div', { style: { display: 'flex', gap: '5px' } });
    ex.sets.forEach((s, sIdx) => {
      const btn = h('button', {
        style: { flex: 1, background: s === 'skip' ? '#FFD66610' : 'var(--bg)', border: `1px solid ${s === 'skip' ? '#FFD66622' : 'var(--border)'}`, borderRadius: '6px', padding: '8px 4px', textAlign: 'center', cursor: s === 'skip' ? 'default' : 'pointer', fontFamily: 'var(--font)', color: 'var(--text)' },
        onClick: () => {
          if (s === 'skip') return;
          const newVal = prompt(`Set ${sIdx + 1} (${ex.type === 'timed' ? 'time e.g. 1m15s' : 'reps'}):`, ex.type === 'timed' ? formatTime(s) : String(s));
          if (!newVal) return;
          let parsed;
          if (ex.type === 'timed') { parsed = parseTimeInput(newVal); } else { parsed = parseInt(newVal); }
          if (parsed && parsed > 0) {
            const newResults = JSON.parse(JSON.stringify(state.results));
            newResults[eIdx].sets[sIdx] = parsed;
            setState({ results: newResults });
          }
        }
      });
      btn.appendChild(h('div', { style: { fontSize: '14px', fontWeight: 700, color: s === 'skip' ? 'var(--warn)' : 'var(--text)' } }, fmtVal(s, ex.type)));
      btn.appendChild(h('div', { style: { fontSize: '8px', color: 'var(--text-dim)', marginTop: '1px' } }, `Set ${sIdx + 1}`));

      // +/- delta vs last session
      const lastVal = lastSets[sIdx];
      if (typeof s === 'number' && typeof lastVal === 'number') {
        const delta = s - lastVal;
        const deltaColor = delta > 0 ? 'var(--success)' : delta < 0 ? 'var(--danger)' : 'var(--text-subtle)';
        const deltaText = delta > 0 ? `+${delta}` : delta === 0 ? '=' : String(delta);
        btn.appendChild(h('div', { style: { fontSize: '8px', color: deltaColor, marginTop: '1px', fontWeight: 700 } }, deltaText));
      }

      setsRow.appendChild(btn);
    });
    card.appendChild(setsRow);
    list.appendChild(card);
  });
  frag.appendChild(list);

  frag.appendChild(h('div', { style: { fontSize: '10px', color: 'var(--text-dim)', textAlign: 'center', marginBottom: '14px' } }, 'tap any value to edit · skipped sets stay as-is'));

  // Notes
  const notesLabel = h('div', { className: 'label' }, 'session notes (optional)');
  frag.appendChild(notesLabel);
  const ta = h('textarea', { className: 'textarea', placeholder: 'Anything to remember for next time...' });
  ta.value = state.notes;
  ta.addEventListener('input', (e) => { state.notes = e.target.value; });
  frag.appendChild(ta);

  frag.appendChild(h('div', { style: { height: '16px' } }));

  frag.appendChild(h('button', { className: 'btn btn-primary', onClick: async () => {
    const workout = {
      date: new Date().toISOString(),
      workoutType: state.workoutType,
      notes: state.notes || '',
      exercises: state.results,
    };
    await addWorkout(workout);
    const history = await getAllWorkouts();
    setState({ history, screen: 'home', workoutType: null, exerciseList: [], results: [], notes: '' });
  }}, '✓ SAVE WORKOUT'));

  return frag;
}

// ─── PROGRESS ───
function renderProgress() {
  const frag = h('div', { className: 'fade-in' });

  if (state.progressSelected) return renderProgressDetail(frag);

  frag.appendChild(h('button', { className: 'back-btn', onClick: () => setState({ screen: 'home' }) }, '← back'));
  frag.appendChild(h('h1', null, 'Progress'));

  // Build exercise list
  const map = new Map();
  for (const w of state.history) for (const ex of w.exercises) {
    const existing = map.get(ex.name);
    if (!existing || new Date(w.date) > new Date(existing.lastDate)) map.set(ex.name, { name: ex.name, type: ex.type, lastDate: w.date });
  }
  let exList = [...map.values()].sort((a, b) => new Date(b.lastDate) - new Date(a.lastDate));

  frag.appendChild(h('p', { style: { color: 'var(--text-muted)', fontSize: '11px', margin: '4px 0 14px' } }, `${exList.length} exercises tracked`));

  // Filter
  const filterRow = h('div', { style: { display: 'flex', gap: '5px', marginBottom: '14px', flexWrap: 'wrap' } });
  [null, 'weighted', 'reps', 'timed'].forEach(t => {
    const active = state.progressFilter === t;
    filterRow.appendChild(h('button', {
      style: { fontFamily: 'var(--font)', fontSize: '10px', padding: '5px 10px', border: active ? '1px solid var(--accent)' : '1px solid var(--border)', background: active ? '#CDFF5022' : 'transparent', color: active ? 'var(--accent)' : 'var(--text-muted)', borderRadius: '6px', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: 700 },
      onClick: () => setState({ progressFilter: t })
    }, t || 'all'));
  });
  frag.appendChild(filterRow);

  if (state.progressFilter) exList = exList.filter(e => e.type === state.progressFilter);

  const listEl = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '5px' } });
  exList.forEach(ex => {
    const hist = getExHistory(state.history, ex.name);
    const last = hist[hist.length - 1];
    const card = h('button', { className: 'card card-btn', style: { padding: '12px' }, onClick: () => setState({ progressSelected: ex.name }) });
    const row = h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } });
    const left = h('div');
    const nameRow = h('div', { style: { display: 'flex', alignItems: 'center', gap: '6px' } });
    nameRow.appendChild(h('span', { style: { fontSize: '13px', fontWeight: 700, color: 'var(--text)' } }, ex.name));
    nameRow.appendChild(h('span', { className: `pill ${pillClass(ex.type)}` }, pillLabel(ex.type)));
    left.appendChild(nameRow);
    left.appendChild(h('div', { style: { fontSize: '10px', color: 'var(--text-muted)', marginTop: '2px' } },
      `${hist.length} session${hist.length !== 1 ? 's' : ''}${last?.weight ? ` · last: ${last.weight}${last.weightUnit || 'lbs'}` : ''}`));
    row.appendChild(left);
    row.appendChild(h('span', { style: { color: 'var(--text-dim)', fontSize: '16px' } }, '→'));
    card.appendChild(row);
    listEl.appendChild(card);
  });
  frag.appendChild(listEl);

  return frag;
}

function renderProgressDetail(frag) {
  const name = state.progressSelected;
  const data = getExHistory(state.history, name);
  const exInfo = data[0];
  const isTimed = exInfo?.type === 'timed';
  const isWeighted = exInfo?.type === 'weighted';

  frag.appendChild(h('button', { className: 'back-btn', onClick: () => setState({ progressSelected: null }) }, '← back'));
  frag.appendChild(h('h1', null, name));
  frag.appendChild(h('p', { style: { color: 'var(--text-muted)', fontSize: '11px', margin: '4px 0 16px' } }, `${data.length} session${data.length !== 1 ? 's' : ''} logged`));
  frag.appendChild(h('div', { style: { marginBottom: '16px' } }, h('span', { className: `pill ${pillClass(exInfo.type)}` }, pillLabel(exInfo.type))));

  const chartData = data.map(d => {
    const valid = d.sets.filter(s => s !== 'skip');
    const avg = valid.length > 0 ? valid.reduce((a, b) => a + b, 0) / valid.length : 0;
    return { date: d.date, avg: Math.round(avg * 10) / 10, best: valid.length > 0 ? Math.max(...valid) : 0, weight: d.weight || 0 };
  });
  const labels = chartData.map(d => dateLbl(d.date));

  // Avg chart
  frag.appendChild(h('div', { className: 'label' }, isTimed ? 'Avg Seconds per Set' : 'Avg Reps per Set'));
  const canvas1 = h('canvas', { style: { width: '100%', height: '170px', marginBottom: '8px' } });
  frag.appendChild(canvas1);
  frag.appendChild(h('div', { style: { display: 'flex', gap: '16px', justifyContent: 'center', marginBottom: '20px' } },
    h('span', { style: { fontSize: '9px', color: 'var(--accent)' } }, '— avg'),
    h('span', { style: { fontSize: '9px', color: 'var(--success)' } }, '○ best')
  ));

  // Weight chart
  let canvas2;
  if (isWeighted && chartData.some(d => d.weight > 0)) {
    frag.appendChild(h('div', { className: 'label' }, 'Weight'));
    canvas2 = h('canvas', { style: { width: '100%', height: '130px', marginBottom: '20px' } });
    frag.appendChild(canvas2);
  }

  // Session log
  frag.appendChild(h('div', { className: 'label' }, 'Session Log'));
  data.slice().reverse().forEach(d => {
    const row = h('div', { style: { background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '8px', padding: '10px 12px', marginBottom: '4px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '11px' } });
    row.appendChild(h('span', { style: { color: 'var(--text-muted)' } }, new Date(d.date).toLocaleDateString()));
    const right = h('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } });
    if (d.weight) right.appendChild(h('span', { style: { color: 'var(--warn)' } }, `${d.weight}${d.weightUnit || 'lbs'}`));
    right.appendChild(h('span', { style: { color: 'var(--text)' } }, d.sets.map(s => fmtVal(s, exInfo.type)).join(' / ')));
    row.appendChild(right);
    frag.appendChild(row);
  });

  // Draw charts after DOM insert
  requestAnimationFrame(() => {
    if (canvas1.parentNode) drawChart(canvas1, chartData, 'avg', '#CDFF50', labels);
    if (canvas2?.parentNode) drawChart(canvas2, chartData, 'weight', '#FFD666', labels);
  });

  return frag;
}


// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init() {
  let history = await getAllWorkouts();
  if (history.length === 0) {
    for (const s of SEED) await addWorkout(s);
    history = await getAllWorkouts();
  }
  setState({ history, screen: 'home' });
}

init();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
