// ─── PROGRESS ───
function renderProgress() {
  const frag = h('div', { className: 'fade-in' });

  if (state.progressSelected) return renderProgressDetail(frag);

  const now = new Date();
  const pm = state.progressMonth || { year: now.getFullYear(), month: now.getMonth() };
  const { year, month } = pm;

  // Find earliest workout date
  const earliest = state.history.length > 0
    ? state.history.reduce((min, w) => { const d = new Date(w.date); return d < min ? d : min; }, new Date(state.history[0].date))
    : now;
  const canPrev = year > earliest.getFullYear() || (year === earliest.getFullYear() && month > earliest.getMonth());
  const canNext = year < now.getFullYear() || (year === now.getFullYear() && month < now.getMonth());

  frag.appendChild(h('button', { className: 'back-btn', onClick: () => setState({ screen: 'home' }) }, '← Back'));

  // Month navigation — display title + ← / →
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const navRow = h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '18px' } });
  navRow.appendChild(h('div', { className: 'disp', style: { fontSize: '28px' } }, `${monthNames[month]} ${year}`));
  const navBtns = h('div', { style: { display: 'flex', gap: '18px', fontSize: '20px' } });
  navBtns.appendChild(h('button', {
    style: { background: 'none', border: 'none', color: canPrev ? 'var(--text)' : 'var(--text-dim)', fontSize: '20px', padding: '4px 6px', fontFamily: 'var(--font-ui)', cursor: canPrev ? 'pointer' : 'default' },
    onClick: () => { if (canPrev) { const m = month === 0 ? 11 : month - 1; const y = month === 0 ? year - 1 : year; setState({ progressMonth: { year: y, month: m } }); } }
  }, '←'));
  navBtns.appendChild(h('button', {
    style: { background: 'none', border: 'none', color: canNext ? 'var(--text)' : 'var(--text-dim)', fontSize: '20px', padding: '4px 6px', fontFamily: 'var(--font-ui)', cursor: canNext ? 'pointer' : 'default' },
    onClick: () => { if (canNext) { const m = month === 11 ? 0 : month + 1; const y = month === 11 ? year + 1 : year; setState({ progressMonth: { year: y, month: m } }); } }
  }, '→'));
  navRow.appendChild(navBtns);
  frag.appendChild(navRow);

  const monthWorkouts = getMonthWorkouts(state.history, year, month);

  // ── CONSISTENCY ──
  frag.appendChild(h('div', { className: 'eyebrow', style: { marginBottom: '10px' } }, 'Consistency'));

  // Calendar heatmap
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startDow = (firstDay.getDay() + 6) % 7;

  const dayMap = {};
  monthWorkouts.forEach(w => {
    const day = new Date(w.date).getDate();
    if (!dayMap[day]) dayMap[day] = w.workoutType;
  });

  const grid = h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '4px', marginBottom: '10px' } });
  ['M','T','W','T','F','S','S'].forEach(d => {
    grid.appendChild(h('div', { style: { textAlign: 'center', fontSize: '11px', color: 'var(--text-dim)', paddingBottom: '4px' } }, d));
  });
  for (let i = 0; i < startDow; i++) {
    grid.appendChild(h('div', { style: { width: '32px', height: '32px' } }));
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const wType = dayMap[d];
    const color = wType ? getWorkoutTypeColor(wType) : 'var(--line)';
    const cell = h('div', { style: {
      width: '32px', height: '32px', borderRadius: '8px',
      background: wType ? color : 'transparent',
      border: wType ? 'none' : '1px solid var(--line)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: '11px', color: wType ? '#0C1712' : 'var(--text-dim)', fontWeight: 700,
      fontFamily: 'var(--font-disp)', fontVariantNumeric: 'tabular-nums',
      margin: '0 auto',
    } }, String(d));
    grid.appendChild(cell);
  }
  frag.appendChild(grid);

  // Legend
  const legend = h('div', { style: { display: 'flex', gap: '14px', justifyContent: 'center', marginBottom: '18px', flexWrap: 'wrap' } });
  [['Push + Legs', 'var(--amber)'], ['Pull + Core', 'var(--jade)'], ['Full Body', 'var(--blue)']].forEach(([label, color]) => {
    const item = h('div', { style: { display: 'flex', alignItems: 'center', gap: '6px' } });
    item.appendChild(h('div', { style: { width: '10px', height: '10px', borderRadius: '3px', background: color } }));
    item.appendChild(h('span', { style: { fontSize: '12px', color: 'var(--text-muted)' } }, label));
    legend.appendChild(item);
  });
  frag.appendChild(legend);

  // Stats row
  const sessions = monthWorkouts.length;
  // Weeks elapsed: how many weeks (or partial) have passed in this month
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();
  const lastDayOfMonth = isCurrentMonth ? now.getDate() : daysInMonth;
  const weeksElapsed = Math.max(lastDayOfMonth / 7, 1);
  const perWeek = Math.round((sessions / weeksElapsed) * 10) / 10;

  // Streak: consecutive weeks with ≥3 sessions (Mon-Sun), counting backward
  function calcStreak() {
    // Build a map of all workouts by week (Mon-Sun)
    function getWeekKey(date) {
      const d = new Date(date);
      // Get Monday of that week
      const day = d.getDay();
      const diff = (day === 0 ? -6 : 1) - day;
      const mon = new Date(d);
      mon.setDate(d.getDate() + diff);
      return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
    }

    const weekCounts = {};
    state.history.forEach(w => {
      const key = getWeekKey(new Date(w.date));
      weekCounts[key] = (weekCounts[key] || 0) + 1;
    });

    // Get sorted week keys
    const allWeeks = Object.keys(weekCounts).sort().reverse();
    if (allWeeks.length === 0) return 0;

    // Find the current week's Monday
    const today = new Date();
    const currentWeekKey = getWeekKey(today);
    // Most recent completed week = if current week has ≥3, include it, otherwise start from previous
    let streak = 0;

    // Generate consecutive week keys going backward from current week
    function prevWeekKey(key) {
      const d = new Date(key + 'T12:00:00');
      d.setDate(d.getDate() - 7);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    let checkKey = currentWeekKey;
    // If current week has ≥3, count it and move to previous
    if ((weekCounts[checkKey] || 0) >= 3) {
      streak++;
      checkKey = prevWeekKey(checkKey);
    } else {
      // Current week doesn't qualify; start checking from previous completed week
      checkKey = prevWeekKey(checkKey);
    }

    // Count backward
    while ((weekCounts[checkKey] || 0) >= 3) {
      streak++;
      checkKey = prevWeekKey(checkKey);
    }

    return streak;
  }

  const streak = calcStreak();

  const statsCard = h('div', { className: 'card', style: { display: 'flex', justifyContent: 'space-around', alignItems: 'center', marginBottom: '18px' } });
  // Sessions ring (target = weeks * 3)
  const sessionTarget = Math.max(1, Math.round(weeksElapsed * 3));
  statsCard.appendChild(ring({ value: sessions, total: sessionTarget, size: 86, color: 'var(--jade)' },
    h('div', { className: 'num', style: { fontSize: '24px', color: 'var(--text)' } }, String(sessions)),
    h('div', { style: { fontSize: '10px', color: 'var(--text-dim)' } }, 'sessions'),
  ));
  statsCard.appendChild(ring({ value: Math.min(perWeek, 4), total: 4, size: 86, color: 'var(--amber)' },
    h('div', { className: 'num', style: { fontSize: '22px', color: 'var(--text)' } }, String(perWeek)),
    h('div', { style: { fontSize: '10px', color: 'var(--text-dim)' } }, 'per week'),
  ));
  statsCard.appendChild(ring({ value: Math.min(streak, 8), total: 8, size: 86, color: streak > 0 ? 'var(--jade)' : 'var(--coral)' },
    h('div', { className: 'num', style: { fontSize: '24px', color: 'var(--text)' } }, String(streak)),
    h('div', { style: { fontSize: '10px', color: 'var(--text-dim)' } }, 'wk streak'),
  ));
  frag.appendChild(statsCard);

  // ── Monthly volume trend chart (smooth area) ──
  if (state.history.length > 1) {
    // Last 6 months including current selection, total volume per month
    const trendCard = h('div', { className: 'card', style: { marginBottom: '18px' } });
    const data = [];
    for (let i = 5; i >= 0; i--) {
      let y = year, m = month - i;
      while (m < 0) { m += 12; y -= 1; }
      const ws = getMonthWorkouts(state.history, y, m);
      const vol = ws.reduce((sum, w) => sum + w.exercises.reduce((s, e) => s + calcVolume(e), 0), 0);
      data.push(vol);
    }
    const last = data[data.length - 1], prev = data[data.length - 2] || 0;
    const pct = prev > 0 ? Math.round(((last - prev) / prev) * 100) : 0;
    const headRow = h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' } });
    headRow.appendChild(h('div', { className: 'eyebrow' }, 'Total volume trend'));
    if (last > 0 && prev > 0) {
      headRow.appendChild(h('div', { className: 'num ' + (pct >= 0 ? 'up' : 'down'), style: { fontSize: '16px' } },
        (pct >= 0 ? '+' : '') + pct + '%'));
    }
    trendCard.appendChild(headRow);
    if (data.some(v => v > 0)) trendCard.appendChild(areaChart(data, { width: 320, height: 110 }));
    else trendCard.appendChild(h('div', { style: { fontSize: '13px', color: 'var(--text-dim)', marginTop: '8px' } }, 'No volume data yet.'));
    frag.appendChild(trendCard);
  }

  // ── STRENGTH HIGHLIGHTS ──
  frag.appendChild(h('div', { className: 'eyebrow', style: { marginBottom: '12px' } }, 'Strength highlights'));

  // Volume Trends (weighted only)
  const weightedExNames = new Set();
  monthWorkouts.forEach(w => w.exercises.filter(e => e.type === 'weighted').forEach(e => weightedExNames.add(e.name)));

  if (weightedExNames.size > 0) {
    // Find comparison month (previous month with data, default to month-1)
    let compYear = month === 0 ? year - 1 : year;
    let compMonth = month === 0 ? 11 : month - 1;
    let compWorkouts = getMonthWorkouts(state.history, compYear, compMonth);
    // If no data last month, try the month before
    if (compWorkouts.length === 0) {
      compYear = compMonth === 0 ? compYear - 1 : compYear;
      compMonth = compMonth === 0 ? 11 : compMonth - 1;
      compWorkouts = getMonthWorkouts(state.history, compYear, compMonth);
    }

    const trends = [];
    weightedExNames.forEach(name => {
      const thisMonthSessions = [];
      monthWorkouts.forEach(w => {
        w.exercises.filter(e => e.name === name).forEach(e => { thisMonthSessions.push(calcVolume(e)); });
      });
      const thisAvg = thisMonthSessions.length > 0 ? thisMonthSessions.reduce((a, b) => a + b, 0) / thisMonthSessions.length : 0;

      const compSessions = [];
      compWorkouts.forEach(w => {
        w.exercises.filter(e => e.name === name).forEach(e => { compSessions.push(calcVolume(e)); });
      });
      const compAvg = compSessions.length > 0 ? compSessions.reduce((a, b) => a + b, 0) / compSessions.length : 0;

      if (thisAvg > 0) {
        let pct = null;
        if (compAvg > 0) pct = Math.round(((thisAvg - compAvg) / compAvg) * 100);
        trends.push({ name, pct });
      }
    });

    if (trends.length > 0) {
      const maxAbs = Math.max(1, ...trends.filter(t => t.pct != null).map(t => Math.abs(t.pct)));
      const list = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '14px', marginBottom: '22px' } });
      trends.forEach(t => {
        const row = h('div', { style: { display: 'flex', alignItems: 'center', gap: '14px' } });
        row.appendChild(h('span', { style: { fontSize: '14px', width: '130px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', color: 'var(--text)' } }, t.name));
        const track = h('div', { style: { flex: 1, height: '6px', background: 'var(--surface-alt)', borderRadius: '3px', overflow: 'hidden' } });
        if (t.pct != null) {
          const w = (Math.abs(t.pct) / maxAbs) * 100;
          track.appendChild(h('div', { style: { height: '100%', width: w + '%', background: t.pct < 0 ? 'var(--coral)' : 'var(--jade)', borderRadius: '3px' } }));
        }
        row.appendChild(track);
        const label = t.pct == null ? 'new'
          : t.pct < 0 ? String(t.pct) + '%'
          : '+' + t.pct + '%';
        const cls = t.pct == null ? 'eq' : t.pct < 0 ? 'down' : 'up';
        row.appendChild(h('span', { className: 'num ' + cls, style: { fontSize: '15px', width: '54px', textAlign: 'right' } }, label));
        list.appendChild(row);
      });
      frag.appendChild(list);
    }
  }

  // ── PER-EXERCISE DETAIL ──
  frag.appendChild(h('div', { className: 'eyebrow', style: { marginBottom: '12px' } }, 'Exercises'));

  // Build exercise list
  const map = new Map();
  for (const w of state.history) for (const ex of w.exercises) {
    const existing = map.get(ex.name);
    if (!existing || new Date(w.date) > new Date(existing.lastDate)) map.set(ex.name, { name: ex.name, type: ex.type, lastDate: w.date });
  }
  let exList = [...map.values()].sort((a, b) => new Date(b.lastDate) - new Date(a.lastDate));

  // Filter chips
  const filterRow = h('div', { style: { display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' } });
  [null, 'weighted', 'reps', 'timed'].forEach(t => {
    const active = state.progressFilter === t;
    filterRow.appendChild(h('button', {
      className: 'pill',
      style: { fontFamily: 'var(--font-ui)', fontSize: '12px', padding: '6px 12px', border: 'none', background: active ? 'var(--jade-soft)' : 'var(--surface-alt)', color: active ? 'var(--jade)' : 'var(--text-muted)', cursor: 'pointer' },
      onClick: () => setState({ progressFilter: t })
    }, t || 'all'));
  });
  frag.appendChild(filterRow);

  if (state.progressFilter) exList = exList.filter(e => e.type === state.progressFilter);

  const listEl = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px' } });
  exList.forEach(ex => {
    const hist = getExHistory(state.history, ex.name);
    const last = hist[hist.length - 1];
    const card = h('button', { className: 'card-sm card-btn', style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between' }, onClick: () => setState({ progressSelected: ex.name }) });
    const left = h('div');
    const nameRow = h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px' } });
    nameRow.appendChild(h('span', { style: { fontSize: '15px', fontWeight: 600, color: 'var(--text)' } }, ex.name));
    nameRow.appendChild(h('span', { className: `pill ${pillClass(ex.type)}` }, pillLabel(ex.type)));
    left.appendChild(nameRow);
    left.appendChild(h('div', { style: { fontSize: '13px', color: 'var(--text-muted)', marginTop: '4px' } },
      `${hist.length} session${hist.length !== 1 ? 's' : ''}${last?.weight ? ` · last: ${last.weight}${last.weightUnit || 'lbs'}` : ''}`));
    card.appendChild(left);
    card.appendChild(h('span', { style: { color: 'var(--text-dim)', fontSize: '18px' } }, '→'));
    listEl.appendChild(card);
  });
  frag.appendChild(listEl);

  return frag;
}

function renderProgressDetail(frag) {
  const name = state.progressSelected;
  const data = getExHistory(state.history, name);
  const exInfo = data[0];
  const isTimed = exInfo?.type === 'timed';
  const isWeighted = exInfo?.type === 'weighted';

  frag.appendChild(h('button', { className: 'back-btn', onClick: () => setState({ progressSelected: null }) }, '← Back'));
  frag.appendChild(h('h1', { style: { fontSize: '34px', marginTop: '4px' } }, name));
  frag.appendChild(h('p', { style: { color: 'var(--text-muted)', fontSize: '15px', margin: '8px 0 14px' } }, `${data.length} session${data.length !== 1 ? 's' : ''} logged`));
  frag.appendChild(h('div', { style: { marginBottom: '18px' } }, h('span', { className: `pill ${pillClass(exInfo.type)}` }, pillLabel(exInfo.type))));

  let series, label;
  if (isWeighted) {
    series = data.map(d => calcVolume(d));
    label = 'Session volume';
  } else {
    series = data.map(d => {
      const valid = d.sets.filter(s => s !== 'skip');
      return valid.length > 0 ? valid.reduce((a, b) => a + b, 0) / valid.length : 0;
    });
    label = isTimed ? 'Avg seconds per set' : 'Avg reps per set';
  }

  const chartCard = h('div', { className: 'card', style: { marginBottom: '18px' } });
  const chartHead = h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' } });
  chartHead.appendChild(h('div', { className: 'eyebrow' }, label));
  if (series.length > 1) {
    const first = series[0], last = series[series.length - 1];
    if (first > 0) {
      const pct = Math.round(((last - first) / first) * 100);
      chartHead.appendChild(h('div', { className: 'num ' + (pct >= 0 ? 'up' : 'down'), style: { fontSize: '16px' } },
        (pct >= 0 ? '+' : '') + pct + '%'));
    }
  }
  chartCard.appendChild(chartHead);
  if (series.length > 0) chartCard.appendChild(areaChart(series, { width: 320, height: 110 }));
  frag.appendChild(chartCard);

  // Session log
  frag.appendChild(h('div', { className: 'eyebrow', style: { marginBottom: '10px' } }, 'Session log'));
  const logList = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px' } });
  data.slice().reverse().forEach(d => {
    const row = h('div', { className: 'card-sm', style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px' } });
    row.appendChild(h('span', { style: { color: 'var(--text-muted)', fontSize: '13px' } }, new Date(d.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })));
    const right = h('div', { style: { display: 'flex', gap: '10px', alignItems: 'center' } });
    if (d.weight) right.appendChild(h('span', { className: 'pill pill-weight' }, `${d.weight}${d.weightUnit || 'lbs'}`));
    right.appendChild(h('span', { className: 'num', style: { color: 'var(--text)', fontSize: '15px' } }, d.sets.map(s => fmtVal(s, exInfo.type)).join(' / ')));
    row.appendChild(right);
    logList.appendChild(row);
  });
  frag.appendChild(logList);

  return frag;
}


// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init() {
  let history = await getAllWorkouts();
  if (history.length === 0) {
    for (const s of SEED) await addWorkout(s);
    history = await getAllWorkouts();
  }
  const library = await seedExerciseLibrary(history);
  setState({ history, library, screen: 'home', showBackupReminder: checkBackupReminder() });
}

init();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
