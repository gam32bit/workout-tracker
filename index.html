// ═══════════════════════════════════════
// DATABASE (IndexedDB)
// ═══════════════════════════════════════
const DB_NAME = 'progressive-overload';
const DB_VERSION = 2;
const STORE = 'workouts';
const EX_STORE = 'exercises';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        store.createIndex('workoutType', 'workoutType', { unique: false });
        store.createIndex('date', 'date', { unique: false });
      }
      if (!db.objectStoreNames.contains(EX_STORE)) {
        db.createObjectStore(EX_STORE, { keyPath: 'key' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function getAllWorkouts() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const store = tx.objectStore(STORE);
    const req = store.index('date').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function addWorkout(workout) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).add(workout);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function deleteWorkout(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function clearAllWorkouts() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ─── Exercise library ───
function exKey(name) { return name.trim().toLowerCase(); }

async function getAllExercises() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(EX_STORE, 'readonly');
    const req = tx.objectStore(EX_STORE).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function putExercise(ex) {
  const db = await openDB();
  const record = {
    key: exKey(ex.name),
    name: ex.name.trim(),
    type: ex.type,
    bilateral: !!ex.bilateral,
    createdAt: ex.createdAt || new Date().toISOString(),
  };
  return new Promise((resolve, reject) => {
    const tx = db.transaction(EX_STORE, 'readwrite');
    const req = tx.objectStore(EX_STORE).put(record);
    req.onsuccess = () => resolve(record);
    req.onerror = () => reject(req.error);
  });
}

async function seedExerciseLibrary(history) {
  const existing = await getAllExercises();
  const haveKeys = new Set(existing.map(e => e.key));
  const toAdd = new Map();
  const considerEx = (ex) => {
    if (!ex || !ex.name) return;
    const k = exKey(ex.name);
    if (haveKeys.has(k) || toAdd.has(k)) return;
    toAdd.set(k, { name: ex.name.trim(), type: ex.type || 'weighted', bilateral: !!ex.bilateral });
  };
  for (const list of Object.values(TEMPLATES)) for (const ex of list) considerEx(ex);
  for (const w of history) for (const ex of w.exercises) considerEx(ex);
  for (const ex of toAdd.values()) await putExercise(ex);
  return await getAllExercises();
}

async function exportWorkouts() {
  const workouts = await getAllWorkouts();
  const payload = { version: 1, exportedAt: new Date().toISOString(), workouts };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0, 10);
  const a = document.createElement('a');
  a.href = url; a.download = `workout-backup-${date}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  localStorage.setItem('lastBackupDate', new Date().toISOString());
  setState({ showBackupReminder: false });
}

function importWorkouts() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.workouts || !Array.isArray(data.workouts)) {
        alert('Invalid backup file.');
        return;
      }
      const ok = confirm(`Import ${data.workouts.length} workout(s)? They will be added to your existing data.`);
      if (!ok) return;
      for (const w of data.workouts) {
        const { id: _id, ...workout } = w;
        await addWorkout(workout);
      }
      const history = await getAllWorkouts();
      const library = await seedExerciseLibrary(history);
      setState({ history, library });
    } catch {
      alert('Could not read backup file.');
    }
  };
  input.click();
}

function checkBackupReminder() {
  const lastBackup = localStorage.getItem('lastBackupDate');
  const dismissed = localStorage.getItem('backupReminderDismissed');
  const today = new Date().toISOString().slice(0, 10);
  if (dismissed === today) return false;
  if (!lastBackup) return true;
  const daysSince = (Date.now() - new Date(lastBackup)) / (1000 * 60 * 60 * 24);
  return daysSince >= 7;
}

function formatTime(s) {
  if (s == null) return '—';
  const m = Math.floor(s / 60), sec = s % 60;
  return m > 0 ? `${m}m${sec > 0 ? sec.toString().padStart(2,'0') + 's' : ''}` : `${sec}s`;
}

function parseTimeInput(str) {
  str = str.trim().toLowerCase();
  let m;
  if ((m = str.match(/^(\d+)m\s*(\d+)s?$/))) return +m[1]*60 + +m[2];
  if ((m = str.match(/^(\d+):(\d+)$/))) return +m[1]*60 + +m[2];
  if ((m = str.match(/^(\d+)m$/))) return +m[1]*60;
  if ((m = str.match(/^(\d+)s?$/))) return +m[1];
  return null;
}

function fmtVal(v, type) {
  if (v == null) return '—';
  if (v === 'skip') return 'SKIP';
  return type === 'timed' ? formatTime(v) : String(v);
}

function getLastForType(history, type) {
  for (let i = history.length - 1; i >= 0; i--) if (history[i].workoutType === type) return history[i];
  return null;
}

function getExHistory(history, name) {
  const r = [];
  for (const w of history) for (const ex of w.exercises) if (ex.name === name) r.push({ date: w.date, ...ex });
  return r;
}

function buildDelta(curVal, curWeight, lastVal, lastWeight, type) {
  if (typeof curVal !== 'number' || typeof lastVal !== 'number') return null;
  let delta, text;
  if (type === 'weighted' && typeof curWeight === 'number' && typeof lastWeight === 'number') {
    const curVol = curVal * curWeight;
    const lastVol = lastVal * lastWeight;
    delta = curVol - lastVol;
    text = delta > 0 ? `+${delta} vol` : delta === 0 ? '= vol' : `${delta} vol`;
  } else {
    delta = curVal - lastVal;
    text = delta > 0 ? `+${delta}` : delta === 0 ? '=' : String(delta);
  }
  const color = delta > 0 ? 'var(--success)' : delta < 0 ? 'var(--danger)' : 'var(--text-subtle)';
  return { text, color };
}

function dateLbl(iso) { const d = new Date(iso); return `${d.getMonth()+1}/${d.getDate()}`; }

function pillClass(type) { return type === 'weighted' ? 'pill-weight' : type === 'timed' ? 'pill-timed' : 'pill-reps'; }
function pillLabel(type) { return type === 'weighted' ? 'weight' : type === 'timed' ? 'timed' : 'reps'; }

function getMonthWorkouts(history, year, month) {
  return history.filter(w => {
    const d = new Date(w.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });
}

function calcVolume(ex) {
  if (ex.type !== 'weighted' || !ex.weight) return 0;
  const reps = ex.sets.filter(s => typeof s === 'number').reduce((a, b) => a + b, 0);
  return ex.weight * reps;
}

function getWorkoutTypeColor(type) {
  if (type === 'Push + Legs') return 'var(--amber)';
  if (type === 'Pull + Core') return 'var(--jade)';
  if (type === 'Full Body') return 'var(--blue)';
  return 'var(--text-dim)';
}

// ─── Drag-and-drop reorder (Pointer Events) ───
// Attach to a handle element. On drop, calls onReorder(fromIdx, toIdx).
// isDraggable(idx) gates which indices can be dragged or moved past.
function attachDragHandle(handleEl, listEl, rowSelector, fromIdx, isDraggable, onReorder) {
  handleEl.style.touchAction = 'none';
  handleEl.addEventListener('pointerdown', (e) => {
    if (!isDraggable(fromIdx)) return;
    e.preventDefault();
    const rowEls = Array.from(listEl.querySelectorAll(rowSelector));
    const row = rowEls[fromIdx];
    if (!row) return;
    const rowH = row.getBoundingClientRect().height;
    const gap = rowEls.length > 1
      ? rowEls[1].getBoundingClientRect().top - rowEls[0].getBoundingClientRect().bottom
      : 0;
    const step = rowH + Math.max(gap, 0);
    let currentIdx = fromIdx;
    const startY = e.clientY;
    try { handleEl.setPointerCapture(e.pointerId); } catch {}

    row.style.position = 'relative';
    row.style.zIndex = '20';
    row.style.boxShadow = '0 8px 22px rgba(0,0,0,0.5)';
    row.style.transition = 'none';
    rowEls.forEach((r, i) => { if (i !== fromIdx) r.style.transition = 'transform 0.15s ease'; });
    document.body.style.userSelect = 'none';

    function findMaxIdx() {
      let i = rowEls.length - 1;
      while (i > fromIdx && !isDraggable(i)) i--;
      return i;
    }
    function findMinIdx() {
      let i = 0;
      while (i < fromIdx && !isDraggable(i)) i++;
      return i;
    }
    const maxIdx = findMaxIdx();
    const minIdx = findMinIdx();

    function onMove(ev) {
      const dy = ev.clientY - startY;
      row.style.transform = `translateY(${dy}px)`;
      let newIdx = fromIdx + Math.round(dy / step);
      if (newIdx < minIdx) newIdx = minIdx;
      if (newIdx > maxIdx) newIdx = maxIdx;
      if (newIdx === currentIdx) return;
      currentIdx = newIdx;
      rowEls.forEach((r, i) => {
        if (i === fromIdx) return;
        let shift = 0;
        if (newIdx > fromIdx && i > fromIdx && i <= newIdx) shift = -step;
        else if (newIdx < fromIdx && i < fromIdx && i >= newIdx) shift = step;
        r.style.transform = `translateY(${shift}px)`;
      });
    }
    function onUp() {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.removeEventListener('pointercancel', onUp);
      document.body.style.userSelect = '';
      try { handleEl.releasePointerCapture(e.pointerId); } catch {}
      if (currentIdx !== fromIdx) {
        onReorder(fromIdx, currentIdx);
      } else {
        // reset visuals; no re-render needed
        rowEls.forEach(r => {
          r.style.transform = '';
          r.style.transition = '';
          r.style.zIndex = '';
          r.style.boxShadow = '';
          r.style.position = '';
        });
      }
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
  });
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'htmlFor') el.setAttribute('for', v);
    else el.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') el.appendChild(document.createTextNode(c));
    else if (Array.isArray(c)) c.forEach(ch => ch && el.appendChild(ch));
    else el.appendChild(c);
  }
  return el;
}

// SVG element factory (namespaced)
function sv(tag, attrs, ...children) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (v == null) continue;
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else el.setAttribute(k, v);
  }
  for (const c of children) { if (c) el.appendChild(c); }
  return el;
}

// Donut ring: value/total mapped to arc, optional inner content centered.
function ring({ value, total, size = 92, stroke = 9, color = 'var(--jade)', track = 'var(--line)' }, ...inner) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - Math.max(0, Math.min(1, value / total)));
  const svg = sv('svg', { width: size, height: size, style: 'transform:rotate(-90deg)' },
    sv('circle', { cx: size / 2, cy: size / 2, r, fill: 'none', stroke: track, 'stroke-width': stroke }),
    sv('circle', { cx: size / 2, cy: size / 2, r, fill: 'none', stroke: color, 'stroke-width': stroke,
      'stroke-dasharray': c, 'stroke-dashoffset': off, 'stroke-linecap': 'round' }),
  );
  const wrap = h('div', { style: { position: 'relative', width: size + 'px', height: size + 'px', flexShrink: 0 } });
  wrap.appendChild(svg);
  const inset = h('div', { style: { position: 'absolute', inset: '0', display: 'flex', flexDirection: 'column',
    alignItems: 'center', justifyContent: 'center', textAlign: 'center' } });
  inner.forEach(n => { if (n) inset.appendChild(n); });
  wrap.appendChild(inset);
  return wrap;
}

// Smooth area chart — accepts an array of numbers, returns an inline <svg>.
let __areaSeq = 0;
function areaChart(data, { color = 'var(--jade)', width = 320, height = 110, dot = true } = {}) {
  if (!data || data.length === 0) return h('div');
  const W = width, H = height;
  const max = Math.max(...data);
  const minRaw = Math.min(...data);
  const span = max - minRaw;
  const min = span === 0 ? minRaw - 1 : minRaw - span * 0.1;
  const top = max + (span === 0 ? 1 : span * 0.1);
  const pts = data.length === 1
    ? [[W / 2, H / 2]]
    : data.map((d, i) => [10 + (i * (W - 20)) / (data.length - 1), H - 10 - ((d - min) / (top - min)) * (H - 28)]);
  const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const last = pts[pts.length - 1];
  const first = pts[0];
  const area = `${line} L${last[0].toFixed(1)} ${H} L${first[0].toFixed(1)} ${H} Z`;
  const gid = 'ac' + (++__areaSeq);
  return sv('svg', { width: '100%', viewBox: `0 0 ${W} ${H}`, preserveAspectRatio: 'none', style: 'display:block;height:110px' },
    sv('defs', null,
      sv('linearGradient', { id: gid, x1: '0', y1: '0', x2: '0', y2: '1' },
        sv('stop', { offset: '0', 'stop-color': '#5FD3A8', 'stop-opacity': '0.32' }),
        sv('stop', { offset: '1', 'stop-color': '#5FD3A8', 'stop-opacity': '0' }),
      ),
    ),
    sv('path', { d: area, fill: `url(#${gid})` }),
    sv('path', { d: line, fill: 'none', stroke: color, 'stroke-width': '3', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }),
    dot && pts.length > 0
      ? sv('circle', { cx: last[0].toFixed(1), cy: last[1].toFixed(1), r: '5', fill: '#5FD3A8', stroke: '#131519', 'stroke-width': '2.5' })
      : null,
  );
}

// Numeric stepper: − [tappable num] +. Tapping the num focuses an invisible
// numeric input so the OS keyboard can override the stepped value.
function numStepper({ value, min = 0, max = 999, step = 1, bigStep = null, onChange }) {
  const gap = bigStep ? '12px' : '24px';
  const wrap = h('div', { style: { display: 'flex', justifyContent: 'center', alignItems: 'center', gap, position: 'relative' } });
  const cur = { v: typeof value === 'number' ? value : (parseInt(value) || 0) };
  const bigMinus = bigStep ? h('button', { className: 'stepper-btn-lg', onClick: () => set(cur.v - bigStep) }, '−' + bigStep) : null;
  const bigPlus  = bigStep ? h('button', { className: 'stepper-btn-lg', onClick: () => set(cur.v + bigStep) }, '+' + bigStep) : null;
  const minus = h('button', { className: 'stepper-btn', onClick: () => set(cur.v - step) }, '−');
  const plus  = h('button', { className: 'stepper-btn', onClick: () => set(cur.v + step) }, '+');
  const display = h('button', { className: 'stepper-num', onClick: () => { input.focus(); input.select(); } }, String(cur.v));
  const input = h('input', { className: 'stepper-input', type: 'number', inputMode: 'numeric',
    value: String(cur.v) });
  input.addEventListener('input', (e) => {
    const n = parseInt(e.target.value);
    if (!isNaN(n)) { cur.v = clamp(n); display.textContent = String(cur.v); onChange && onChange(cur.v); }
  });
  function clamp(n) { return Math.max(min, Math.min(max, n)); }
  function set(n) {
    cur.v = clamp(n);
    display.textContent = String(cur.v);
    input.value = String(cur.v);
    onChange && onChange(cur.v);
  }
  if (bigMinus) wrap.appendChild(bigMinus);
  wrap.appendChild(minus);
  wrap.appendChild(display);
  wrap.appendChild(plus);
  if (bigPlus) wrap.appendChild(bigPlus);
  wrap.appendChild(input);
  return wrap;
}

// APP STATE & RENDERING

let state = {
  screen: 'loading',
  showBackupReminder: false,
  history: [],
  workoutType: null,
  exerciseList: [],
  exIdx: 0,
  setIdx: 0,
  results: [],
  weight: '',
  weightUnit: 'lbs',
  weightConfirmed: false,
  inputVal: '',
  notes: '',
  workoutDate: null,
  showDatePicker: false,
  progressMonth: null,
  progressFilter: null,
  progressSelected: null,
  viewingWorkout: null,
  viewingWorkoutFrom: 'home',
  allWorkoutsLimit: 10,
  showExerciseManager: false,
  library: [],
  showNotesSheet: false,
  showExercisePicker: false,
  pickerQuery: '',
  pickerCreating: false,
  pickerContext: 'editList',
  pickerNewType: 'weighted',
  pickerNewBilateral: false,
  pickerNewName: '',
};

function setState(partial) {
  Object.assign(state, partial);
  render();
}

const app = document.getElementById('app');

function render() {
  app.innerHTML = '';
  const s = state;
  switch (s.screen) {
    case 'loading': app.appendChild(renderLoading()); break;
    case 'home': app.appendChild(renderHome()); break;
    case 'selectType': app.appendChild(renderSelectType()); break;
    case 'editList': app.appendChild(renderEditList()); break;
    case 'logging': app.appendChild(renderLogging()); break;
    case 'review': app.appendChild(renderReview()); break;
    case 'progress': app.appendChild(renderProgress()); break;
    case 'workoutDetail': app.appendChild(renderWorkoutDetail()); break;
    case 'allWorkouts': app.appendChild(renderAllWorkouts()); break;
  }
}

function renderLoading() {
  return h('div', { style: { display: 'flex', justifyContent: 'center', alignItems: 'center', height: '60vh' } },
    h('span', { style: { color: 'var(--text-subtle)', fontSize: '11px' } }, 'loading...')
  );
}

// ─── HOME ───
function renderHome() {
  const frag = h('div', { className: 'fade-in' });

  // Weekly progress ring (sessions in the trailing 7 days, target 4)
  const weekTarget = 4;
  const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const weekCount = state.history.filter(w => new Date(w.date).getTime() >= weekAgo).length;

  // Hero: eyebrow + display headline + weekly ring
  const hero = h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '16px', marginBottom: '26px', paddingTop: '12px' } });
  const heroL = h('div', null,
    h('div', { className: 'eyebrow' }, 'Progressive overload'),
    h('div', { className: 'disp', style: { fontSize: '32px', marginTop: '8px' } },
      'Ready when', h('br'), 'you are.'),
  );
  hero.appendChild(heroL);
  hero.appendChild(ring({ value: weekCount, total: weekTarget, size: 92, color: 'var(--jade)' },
    h('div', { className: 'num', style: { fontSize: '26px', color: 'var(--jade)' } }, String(weekCount)),
    h('div', { style: { fontSize: '10px', color: 'var(--text-dim)', marginTop: '-2px' } }, 'of ' + weekTarget),
  ));
  frag.appendChild(hero);

  // Backup reminder banner
  if (state.showBackupReminder) {
    const lastBackup = localStorage.getItem('lastBackupDate');
    const daysSince = lastBackup ? Math.floor((Date.now() - new Date(lastBackup)) / (1000 * 60 * 60 * 24)) : null;
    const msg = daysSince === null
      ? "Your workouts have never been backed up. Export a backup file to keep your data safe."
      : `It's been ${daysSince} day${daysSince !== 1 ? 's' : ''} since your last backup.`;
    const banner = h('div', { className: 'backup-banner' });
    banner.appendChild(h('div', { className: 'backup-banner-text' }, msg));
    const actions = h('div', { className: 'backup-banner-actions' });
    actions.appendChild(h('button', { className: 'btn btn-soft', style: { flex: 1, fontSize: '14px', padding: '10px' }, onClick: exportWorkouts }, 'Export now'));
    actions.appendChild(h('button', { className: 'btn btn-ghost', style: { fontSize: '14px', padding: '10px' },
      onClick: () => { localStorage.setItem('backupReminderDismissed', new Date().toISOString().slice(0, 10)); setState({ showBackupReminder: false }); }
    }, 'Dismiss'));
    banner.appendChild(actions);
    frag.appendChild(banner);
  }

  // Primary + ghost CTAs
  const btns = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px', marginBottom: '28px' } });
  btns.appendChild(h('button', { className: 'btn btn-primary', onClick: () => setState({ screen: 'selectType' }) }, 'Log a workout'));
  const progBtn = h('button', { className: 'btn btn-ghost', onClick: () => setState({ screen: 'progress', progressMonth: null, progressFilter: null, progressSelected: null }) }, 'View progress');
  if (state.history.length === 0) { progBtn.disabled = true; }
  btns.appendChild(progBtn);
  frag.appendChild(btns);

  // Recent workouts
  if (state.history.length > 0) {
    const sorted = [...state.history].sort((a, b) => new Date(b.date) - new Date(a.date));
    const recent = sorted.slice(0, 5);

    frag.appendChild(h('div', { className: 'eyebrow', style: { margin: '0 0 14px' } }, 'Recent'));

    const list = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px', marginBottom: '14px' } });
    recent.forEach(w => {
      const card = h('button', { className: 'card card-btn', style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between' },
        onClick: () => setState({ screen: 'workoutDetail', viewingWorkout: w, viewingWorkoutFrom: 'home' }) });
      const left = h('div', null);
      left.appendChild(h('div', { className: 'disp', style: { fontSize: '20px' } }, w.workoutType));
      const d = new Date(w.date);
      left.appendChild(h('div', { style: { fontSize: '13px', color: 'var(--text-muted)', marginTop: '4px' } },
        `${d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })} · ${w.exercises.length} exercises`));
      if (w.notes) left.appendChild(h('div', { style: { fontSize: '12px', color: 'var(--text-dim)', marginTop: '4px', fontStyle: 'italic', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '240px' } }, `"${w.notes}"`));
      card.appendChild(left);
      card.appendChild(h('span', { style: { color: 'var(--text-dim)', fontSize: '20px' } }, '→'));
      list.appendChild(card);
    });
    frag.appendChild(list);

    if (state.history.length > 5) {
      frag.appendChild(h('button', { className: 'btn btn-ghost', style: { marginBottom: '12px' },
        onClick: () => setState({ screen: 'allWorkouts', allWorkoutsLimit: 10 }) }, 'View all workouts'));
    }

    // Stats card: total sessions / per-week / streak
    const totalSessions = state.history.length;
    const weeksSpan = (() => {
      const dates = state.history.map(w => new Date(w.date).getTime());
      const earliest = Math.min(...dates);
      return Math.max(1, (Date.now() - earliest) / (7 * 24 * 60 * 60 * 1000));
    })();
    const perWeek = Math.round((totalSessions / weeksSpan) * 10) / 10;
    const streak = (() => {
      const days = new Set(state.history.map(w => new Date(w.date).toISOString().slice(0,10)));
      let s = 0;
      const today = new Date(); today.setHours(0,0,0,0);
      for (let i = 0; i < 60; i++) {
        const d = new Date(today); d.setDate(today.getDate() - i);
        if (days.has(d.toISOString().slice(0,10))) s++;
        else if (i > 0) break;
      }
      return s;
    })();
    const stats = h('div', { className: 'card', style: { display: 'flex', justifyContent: 'space-around', textAlign: 'center', padding: '16px 20px', marginBottom: '12px' } });
    [[String(totalSessions), 'sessions', false], [String(perWeek), 'per week', false], [String(streak), 'day streak', true]].forEach(([v, label, isStreak]) => {
      const col = h('div', null);
      col.appendChild(h('div', { className: 'num', style: { fontSize: '26px', color: isStreak ? 'var(--jade)' : 'var(--text)' } }, v));
      col.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-dim)', marginTop: '2px' } }, label));
      stats.appendChild(col);
    });
    frag.appendChild(stats);
  }

  // Export / Import row
  const dataRow = h('div', { className: 'backup-data-row' });
  dataRow.appendChild(h('button', { className: 'btn btn-ghost', style: { flex: 1, fontSize: '13px', padding: '12px' }, onClick: exportWorkouts }, 'Export backup'));
  dataRow.appendChild(h('button', { className: 'btn btn-ghost', style: { flex: 1, fontSize: '13px', padding: '12px' }, onClick: importWorkouts }, 'Import backup'));
  frag.appendChild(dataRow);

  return frag;
}

// ─── SELECT TYPE ───
function renderSelectType() {
  const frag = h('div', { className: 'fade-in' });
  frag.appendChild(h('button', { className: 'back-btn', onClick: () => setState({ screen: 'home' }) }, '← Back'));
  frag.appendChild(h('h1', { style: { fontSize: '32px', marginTop: '6px' } }, 'Select workout'));
  frag.appendChild(h('p', { style: { color: 'var(--text-muted)', fontSize: '15px', margin: '8px 0 22px' } }, 'What are we hitting today?'));

  const types = Object.keys(TEMPLATES).sort((a, b) => {
    const lastA = getLastForType(state.history, a);
    const lastB = getLastForType(state.history, b);
    if (!lastA && !lastB) return 0;
    if (!lastA) return -1;
    if (!lastB) return 1;
    return new Date(lastA.date) - new Date(lastB.date);
  });

  const list = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px' } });
  for (const type of types) {
    const last = getLastForType(state.history, type);
    const card = h('button', { className: 'card card-btn', onClick: () => {
      const exList = last ? last.exercises.map(e => ({ name: e.name, type: e.type, bilateral: e.bilateral || false })) : TEMPLATES[type];
      setState({ screen: 'editList', workoutType: type, exerciseList: JSON.parse(JSON.stringify(exList)) });
    }});
    card.appendChild(h('div', { className: 'disp', style: { fontSize: '20px' } }, type));
    card.appendChild(h('div', { style: { fontSize: '13px', color: 'var(--text-muted)', marginTop: '5px' } },
      last ? `Last: ${new Date(last.date).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })} · ${last.exercises.length} exercises` : 'No sessions yet'));
    if (last?.notes) card.appendChild(h('div', { style: { fontSize: '12px', color: 'var(--text-dim)', marginTop: '5px', fontStyle: 'italic' } }, `"${last.notes}"`));
    list.appendChild(card);
  }
  frag.appendChild(list);
  return frag;
}

  } });
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) onClose(); });
  const sheet = h('div', { style: {

    borderRadius: '20px 20px 0 0', padding: '20px 22px',
    width: '100%', maxWidth: '430px', maxHeight: '80vh', overflow: 'auto',
    paddingBottom: 'max(24px, env(safe-area-inset-bottom))',
  } });
  const header = h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' } });
  header.appendChild(h('div', { className: 'disp', style: { fontSize: '18px', color: 'var(--text)' } }, title));
  header.appendChild(h('button', { style: { background: 'none', border: 'none', color: 'var(--text-muted)', fontSize: '22px', fontFamily: 'var(--font-ui)', padding: '0 4px', cursor: 'pointer', lineHeight: 1 }, onClick: onClose }, '×'));
  sheet.appendChild(header);
  sheet.appendChild(bodyEl);
  backdrop.appendChild(sheet);
  return backdrop;
}

function renderNotesSheet() {
  const body = h('div', {});
  const ta = h('textarea', { className: 'textarea', placeholder: 'Anything to remember for next time...', style: { minHeight: '120px' } });
  ta.value = state.notes || '';
  ta.addEventListener('input', (e) => { state.notes = e.target.value; });
  body.appendChild(ta);
  body.appendChild(h('div', { style: { height: '12px' } }));
  body.appendChild(h('button', { className: 'btn btn-primary', onClick: () => setState({ showNotesSheet: false }) }, 'Done'));
  setTimeout(() => ta.focus(), 50);
  return renderSheet('Session note', body, { onClose: () => setState({ showNotesSheet: false }) });
}

function renderExercisePicker() {
  const body = h('div', {});
  const q = (state.pickerQuery || '').trim().toLowerCase();
  const usedKeys = new Set(state.exerciseList.map(e => exKey(e.name)));
  const filtered = state.library
    .filter(e => !usedKeys.has(e.key))
    .filter(e => !q || e.name.toLowerCase().includes(q))
    .sort((a, b) => a.name.localeCompare(b.name));

  const addExercise = (lib) => {
    const newEx = { name: lib.name, type: lib.type, bilateral: !!lib.bilateral };
    if (state.pickerContext === 'logging') {
      const newResult = { name: lib.name, type: lib.type, bilateral: !!lib.bilateral, weight: null, weightUnit: null, sets: [], setWeights: [] };
      setState({
        exerciseList: [...state.exerciseList, newEx],
        results: [...state.results, newResult],
        showExercisePicker: false, pickerQuery: '', pickerCreating: false,
      });
    } else {
      setState({
        exerciseList: [...state.exerciseList, newEx],
        showExercisePicker: false, pickerQuery: '', pickerCreating: false,
      });
    }
  };

  if (!state.pickerCreating) {
    const search = h('input', { className: 'input', placeholder: 'Search exercises…', style: { marginBottom: '12px', fontSize: '15px' } });
    search.value = state.pickerQuery || '';
    search.addEventListener('input', (e) => {
      state.pickerQuery = e.target.value;
      // Re-render only the list portion to keep focus on the input
      listEl.innerHTML = '';
      buildList();
    });
    body.appendChild(search);

    const listEl = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '5px', marginBottom: '12px' } });
    const buildList = () => {
      const qNow = (state.pickerQuery || '').trim().toLowerCase();
      const items = state.library
        .filter(e => !usedKeys.has(e.key))
        .filter(e => !qNow || e.name.toLowerCase().includes(qNow))
        .sort((a, b) => a.name.localeCompare(b.name));
      if (items.length === 0) {
        listEl.appendChild(h('div', { style: { fontSize: '13px', color: 'var(--text-dim)', padding: '10px 4px', fontStyle: 'italic' } }, 'No matching exercises.'));
      } else {
        items.forEach(lib => {
          const row = h('button', {
            style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '10px', background: 'var(--surface-alt)', border: 'none', borderRadius: '14px', padding: '13px 16px', textAlign: 'left', cursor: 'pointer', fontFamily: 'var(--font-ui)', color: 'var(--text)' },
            onClick: () => addExercise(lib),
          });
          const left = h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', flex: 1, minWidth: 0 } });
          left.appendChild(h('span', { style: { fontSize: '15px', fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, lib.name));
          left.appendChild(h('span', { className: `pill ${pillClass(lib.type)}` }, pillLabel(lib.type)));
          if (lib.bilateral) left.appendChild(h('span', { style: { fontSize: '11px', color: 'var(--text-dim)' } }, '1-side'));
          row.appendChild(left);
          row.appendChild(h('span', { style: { color: 'var(--text-dim)', fontSize: '18px' } }, '+'));
          listEl.appendChild(row);
        });
      }
    };
    buildList();
    body.appendChild(listEl);

    body.appendChild(h('button', { className: 'btn btn-ghost', style: { fontSize: '14px' },
      onClick: () => setState({ pickerCreating: true, pickerNewType: 'weighted', pickerNewBilateral: false, pickerNewName: state.pickerQuery || '' }) },
      '+ Create new exercise'));
  } else {
    body.appendChild(h('div', { className: 'eyebrow' }, 'Name'));
    const nameInp = h('input', { className: 'input', placeholder: 'e.g. Hanging Knee Raises', style: { marginBottom: '14px', fontSize: '15px' } });
    nameInp.value = state.pickerNewName || '';
    nameInp.addEventListener('input', (e) => { state.pickerNewName = e.target.value; });
    body.appendChild(nameInp);

    body.appendChild(h('div', { className: 'eyebrow' }, 'Type'));
    const typeRow = h('div', { style: { display: 'flex', gap: '8px', marginBottom: '14px' } });
    ['weighted', 'reps', 'timed'].forEach(t => {
      const selected = state.pickerNewType === t;
      typeRow.appendChild(h('button', {
        style: { flex: 1, padding: '12px', background: selected ? 'var(--jade-soft)' : 'var(--surface-alt)', color: selected ? 'var(--jade)' : 'var(--text-muted)', border: 'none', borderRadius: '12px', fontFamily: 'var(--font-ui)', fontSize: '14px', fontWeight: 600 },
        onClick: () => { state.pickerNewType = t; setState({}); }
      }, t));
    });
    body.appendChild(typeRow);

    const bilatRow = h('label', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '16px', cursor: 'pointer', fontSize: '14px', color: 'var(--text-muted)' } });
    const cb = h('input', { type: 'checkbox', style: { width: '18px', height: '18px', accentColor: 'var(--jade)' } });
    cb.checked = !!state.pickerNewBilateral;
    cb.addEventListener('change', (e) => { state.pickerNewBilateral = e.target.checked; });
    bilatRow.appendChild(cb);
    bilatRow.appendChild(h('span', null, 'Single-side exercise (e.g. lunges, split squats)'));
    body.appendChild(bilatRow);

    const btnRow = h('div', { style: { display: 'flex', gap: '10px' } });
    btnRow.appendChild(h('button', { className: 'btn btn-ghost', style: { flex: 1 }, onClick: () => setState({ pickerCreating: false }) }, 'Cancel'));
    btnRow.appendChild(h('button', { className: 'btn btn-primary', style: { flex: 2 }, onClick: async () => {
      const name = (nameInp.value || state.pickerNewName || '').trim();
      if (!name) { nameInp.focus(); return; }
      if (state.library.some(e => e.key === exKey(name))) {
        alert('An exercise with that name already exists.');
        return;
      }
      await putExercise({ name, type: state.pickerNewType, bilateral: state.pickerNewBilateral });
      const library = await getAllExercises();
      state.library = library;
      state.pickerNewName = '';
      addExercise({ name, type: state.pickerNewType, bilateral: state.pickerNewBilateral });
    } }, 'Save'));
    body.appendChild(btnRow);

    setTimeout(() => nameInp.focus(), 50);
  }

  return renderSheet(
    state.pickerCreating ? 'New exercise' : 'Add exercise',
    body,
    { onClose: () => setState({ showExercisePicker: false, pickerCreating: false, pickerQuery: '' }) }
  );
}

// ─── EDIT LIST ───
function renderEditList() {
  const frag = h('div', { className: 'fade-in' });
  const last = getLastForType(state.history, state.workoutType);

  frag.appendChild(h('button', { className: 'back-btn', onClick: () => setState({ screen: 'selectType' }) }, '← Back'));
  frag.appendChild(h('h1', { style: { fontSize: '36px', marginTop: '4px' } }, state.workoutType));
  frag.appendChild(h('p', { style: { color: 'var(--text-muted)', fontSize: '15px', margin: '8px 0 18px' } },
    last ? `Last session: ${new Date(last.date).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}` : 'First session — let\'s go.'));

  // Note from last session
  if (last?.notes) {
    const note = h('div', { className: 'card-sm', style: { background: 'rgba(95,211,168,0.08)', marginBottom: '16px' } });
    note.appendChild(h('div', { className: 'eyebrow', style: { color: 'var(--jade)' } }, 'Note from last session'));
    note.appendChild(h('div', { style: { fontSize: '15px', color: 'var(--text)', marginTop: '6px' } }, last.notes));
    frag.appendChild(note);
  }

  // Exercise list
  const listEl = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '12px' } });
  state.exerciseList.forEach((ex, i) => {
    const row = h('div', { 'data-reorder-row': '1', className: 'card-sm', style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 16px' } });
    const left = h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', flex: 1, minWidth: 0 } });
    const handle = h('span', { style: { color: 'var(--text-dim)', cursor: 'grab', padding: '4px 2px 4px 0', flexShrink: 0, lineHeight: 1, userSelect: 'none', display: 'inline-flex', alignItems: 'center' } });
    handle.innerHTML = '<svg width="9" height="14" viewBox="0 0 9 14" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="1.2"/><circle cx="7" cy="2" r="1.2"/><circle cx="2" cy="7" r="1.2"/><circle cx="7" cy="7" r="1.2"/><circle cx="2" cy="12" r="1.2"/><circle cx="7" cy="12" r="1.2"/></svg>';
    attachDragHandle(handle, listEl, '[data-reorder-row]', i, () => true, (from, to) => {
      const l = [...state.exerciseList];
      const [moved] = l.splice(from, 1);
      l.splice(to, 0, moved);
      setState({ exerciseList: l });
    });
    left.appendChild(handle);
    left.appendChild(h('span', { className: 'num', style: { fontSize: '14px', color: 'var(--text-dim)', width: '14px', flexShrink: 0 } }, String(i + 1)));
    left.appendChild(h('span', { style: { fontSize: '16px', fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: 'var(--text)', flex: 1, minWidth: 0 } }, ex.name));
    left.appendChild(h('span', { className: `pill ${pillClass(ex.type)}` }, pillLabel(ex.type)));
    row.appendChild(left);

    const controls = h('div', { style: { display: 'flex', gap: '2px', flexShrink: 0, marginLeft: '8px' } });
    controls.appendChild(h('button', { style: { background: 'none', border: 'none', color: 'var(--text-dim)', fontSize: '18px', padding: '4px 8px', fontFamily: 'var(--font-ui)', cursor: 'pointer' },
      onClick: () => setState({ exerciseList: state.exerciseList.filter((_, j) => j !== i) }) }, '×'));
    row.appendChild(controls);
    listEl.appendChild(row);
  });
  frag.appendChild(listEl);

  // Add exercise (opens picker) — dashed-feel ghost
  const addBtn = h('button', { className: 'btn btn-ghost', style: { marginBottom: '18px', borderStyle: 'dashed' }, onClick: () => {
    setState({ showExercisePicker: true, pickerContext: 'editList', pickerQuery: '', pickerCreating: false });
  }}, '+ Add exercise');
  frag.appendChild(addBtn);

  // Start
  const startBtn = h('button', { className: 'btn btn-primary', onClick: () => {
    setState({
      screen: 'logging', exIdx: 0, setIdx: 0, weight: '', weightUnit: 'lbs', weightConfirmed: false, inputVal: '',
      showExerciseManager: false,
      notes: '',
      results: state.exerciseList.map(ex => ({ name: ex.name, type: ex.type, bilateral: ex.bilateral || false, weight: null, weightUnit: null, sets: [], setWeights: [] }))
    });
  }}, `Start · ${state.exerciseList.length} exercises`);
  if (state.exerciseList.length === 0) startBtn.disabled = true;
  frag.appendChild(startBtn);

  if (state.showExercisePicker) frag.appendChild(renderExercisePicker());

  return frag;
}

// ─── LOGGING ───
function renderLogging() {
  const { exerciseList, exIdx, setIdx, results, weight, weightUnit, weightConfirmed, inputVal, history } = state;
  const ex = exerciseList[exIdx];
  const result = results[exIdx];
  const isWeighted = ex.type === 'weighted';
  const isTimed = ex.type === 'timed';

  const hist = getExHistory(history, ex.name);
  const lastData = hist.length > 0 ? hist[hist.length - 1] : null;
  const lastSets = lastData?.sets || [];
  const needsWeight = isWeighted && !weightConfirmed;

  const progress = ((exIdx * DEFAULT_SETS + setIdx) / (exerciseList.length * DEFAULT_SETS)) * 100;

  const frag = h('div', { className: 'fade-in' });

  // Progress bar
  const pbar = h('div', { className: 'progress-bar' });
  pbar.appendChild(h('div', { className: 'progress-bar-fill', style: { width: progress + '%' } }));
  frag.appendChild(pbar);

  // Top row: back + notes + undo
  const topRow = h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' } });
  topRow.appendChild(h('button', { className: 'back-btn', style: { margin: 0 }, onClick: () => {
    const hasLoggedSets = results.some(r => r.sets.length > 0);
    if (hasLoggedSets && !confirm('You have sets logged. Discard this workout?')) return;
    setState({ screen: 'editList' });
  } }, '← Back'));
  const rightRow = h('div', { style: { display: 'flex', alignItems: 'center', gap: '14px' } });
  const hasNote = !!(state.notes && state.notes.trim());
  rightRow.appendChild(h('button', {
    style: { background: 'none', border: 'none', color: hasNote ? 'var(--jade)' : 'var(--text-muted)', fontSize: '15px', fontFamily: 'var(--font-ui)', padding: '4px 0', cursor: 'pointer' },
    onClick: () => setState({ showNotesSheet: true })
  }, hasNote ? 'Note ✓' : 'Add note'));
  const canUndo = result.sets.length > 0 || (weightConfirmed && result.sets.length === 0) || exIdx > 0;
  if (canUndo) {
    rightRow.appendChild(h('button', {
      style: { background: 'none', border: 'none', color: 'var(--text-muted)', fontSize: '15px', fontFamily: 'var(--font-ui)', padding: '4px 0', cursor: 'pointer' },
      onClick: undoAction
    }, 'Undo'));
  }
  topRow.appendChild(rightRow);
  frag.appendChild(topRow);

  // Title + pill row
  const titleRow = h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '12px' } });
  const titleL = h('div', { style: { minWidth: 0, flex: 1 } });
  titleL.appendChild(h('h1', { style: { fontSize: '36px' } }, ex.name));
  titleL.appendChild(h('div', { style: { color: 'var(--text-muted)', fontSize: '15px', marginTop: '6px' } }, `Exercise ${exIdx + 1} of ${exerciseList.length}`));
  titleRow.appendChild(titleL);
  if (result.weight) {
    if (isWeighted) {
      titleRow.appendChild(h('button', {
        className: 'pill pill-weight',
        style: { marginTop: '10px', flexShrink: 0, border: 'none', cursor: 'pointer', fontFamily: 'var(--font-ui)' },
        onClick: () => { state.weight = String(result.weight); state.weightUnit = result.weightUnit || 'lbs'; setState({ weightConfirmed: false }); }
      }, `${result.weight} ${result.weightUnit} · edit`));
    } else {
      titleRow.appendChild(h('span', { className: 'pill pill-weight', style: { marginTop: '10px', flexShrink: 0 } }, `${result.weight} ${result.weightUnit}`));
    }
  } else {
    titleRow.appendChild(h('span', { className: `pill ${pillClass(ex.type)}`, style: { marginTop: '10px', flexShrink: 0 } }, pillLabel(ex.type)));
  }
  frag.appendChild(titleRow);

  // Last time overview
  if (lastSets.length > 0) {
    const lastBox = h('div', { className: 'card', style: { marginTop: '20px' } });
    lastBox.appendChild(h('div', { className: 'eyebrow', style: { marginBottom: '14px' } }, `Last time${lastData?.weight ? ` · ${lastData.weight} ${lastData.weightUnit || 'lbs'}` : ''}`));
    const setsRow = h('div', { style: { display: 'flex', gap: '10px' } });
    lastSets.forEach((s, i) => {
      const isActive = i === setIdx && result.sets.length === 0;
      const cls = isActive ? 'set-box set-box-active' : 'set-box';
      const box = h('div', { className: cls });
      box.appendChild(h('div', { className: 'num', style: { fontSize: '24px', color: isActive ? 'var(--jade)' : 'var(--text)' } }, fmtVal(s, ex.type)));
      box.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-dim)', marginTop: '4px' } }, `Set ${i + 1}`));
      setsRow.appendChild(box);
    });
    lastBox.appendChild(setsRow);
    frag.appendChild(lastBox);
  }

  // Current sets (with +/- delta)
  if (result.sets.length > 0) {
    const curBox = h('div', { style: { marginTop: '14px' } });
    curBox.appendChild(h('div', { className: 'eyebrow' }, 'This time'));
    const setsRow = h('div', { style: { display: 'flex', gap: '10px' } });
    result.sets.forEach((s, i) => {
      const cls = s === 'skip' ? 'set-box set-box-skip' : 'set-box set-box-done';
      const box = h('div', { className: cls });
      box.appendChild(h('div', { className: 'num', style: { fontSize: '24px', color: s === 'skip' ? 'var(--warn)' : 'var(--jade)' } }, fmtVal(s, ex.type)));
      box.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-dim)', marginTop: '4px' } }, `Set ${i + 1}`));

      const lastVal = lastSets[i];
      const setWeight = (result.setWeights && result.setWeights[i] != null) ? result.setWeights[i] : result.weight;
      const d = buildDelta(s, setWeight, lastVal, lastData?.weight, ex.type);
      if (d) box.appendChild(h('div', { style: { fontSize: '11px', color: d.color, marginTop: '2px', fontWeight: 600 } }, d.text));

      const resultSetWeights = result.setWeights || [];
      const uniqRW = resultSetWeights.filter(w => w != null).filter((w, j, a) => a.indexOf(w) === j);
      if (uniqRW.length > 1 && resultSetWeights[i] != null && s !== 'skip') {
        box.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-muted)', marginTop: '2px', fontWeight: 600 } }, `${resultSetWeights[i]} ${result.weightUnit}`));
      }

      setsRow.appendChild(box);
    });
    curBox.appendChild(setsRow);
    frag.appendChild(curBox);
  }

  if (needsWeight) {
    const isEditingWeight = result.sets.length > 0 || result.weight != null;
    const labelText = isEditingWeight
      ? 'Change weight for upcoming sets'
      : `Weight${lastData?.weight ? ` (last: ${lastData.weight} ${lastData.weightUnit || 'lbs'})` : ''}`;
    frag.appendChild(h('div', { style: { fontSize: '14px', color: 'var(--text-muted)', marginTop: '24px', marginBottom: '8px' } }, labelText));
    const row = h('div', { style: { display: 'flex', gap: '10px', marginBottom: '14px' } });
    const initialWeight = result.weight != null ? String(result.weight) : (lastData?.weight ? String(lastData.weight) : '');
    const inp = h('input', { className: 'input', type: 'number', inputMode: 'numeric', placeholder: 'Weight',
      value: initialWeight,
      style: { flex: 1 } });
    inp.addEventListener('input', (e) => { state.weight = e.target.value; });
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmWeightAction(); });
    if (initialWeight) state.weight = initialWeight;
    if (result.weightUnit) state.weightUnit = result.weightUnit;
    else if (lastData?.weightUnit) state.weightUnit = lastData.weightUnit;
    row.appendChild(inp);

    const unitToggle = h('div', { style: { display: 'flex', borderRadius: '14px', overflow: 'hidden', background: 'var(--surface-alt)' } });
    ['lbs', 'kg'].forEach(u => {
      unitToggle.appendChild(h('button', {
        style: { padding: '12px 16px', background: state.weightUnit === u ? 'var(--jade-soft)' : 'transparent', color: state.weightUnit === u ? 'var(--jade)' : 'var(--text-muted)', border: 'none', fontSize: '14px', fontWeight: 600, fontFamily: 'var(--font-ui)' },
        onClick: () => { state.weightUnit = u; render(); }
      }, u));
    });
    row.appendChild(unitToggle);
    frag.appendChild(row);

    const btnRow = h('div', { style: { display: 'flex', gap: '10px' } });
    btnRow.appendChild(h('button', { className: 'btn btn-primary', style: { flex: 1 }, onClick: confirmWeightAction }, isEditingWeight ? 'Update weight' : 'Confirm weight'));
    if (isEditingWeight) {
      btnRow.appendChild(h('button', { className: 'btn btn-ghost', style: { flex: '0 0 auto', padding: '18px 18px' }, onClick: () => setState({ weightConfirmed: true }) }, 'Cancel'));
    }
    frag.appendChild(btnRow);
    setTimeout(() => inp.focus(), 50);
  } else {
    // Set entry: stepper for reps; freeform input for timed.
    const block = h('div', { style: { textAlign: 'center', marginTop: '26px' } });
    block.appendChild(h('div', { className: 'eyebrow' }, `Set ${setIdx + 1} of ${DEFAULT_SETS} · ${isTimed ? 'time' : 'reps'}`));

    const prevNumeric = [...result.sets].reverse().find(s => typeof s === 'number');
    const initialStr = prevNumeric != null ? (isTimed ? formatTime(prevNumeric) : String(prevNumeric)) : '';

    const previewEl = h('div', { style: { marginTop: '16px', display: 'none', alignItems: 'center', gap: '8px', background: 'rgba(95,211,168,0.10)', borderRadius: '999px', padding: '7px 14px' } });
    function updatePreview(raw) {
      previewEl.textContent = '';
      previewEl.style.display = 'none';
      if (!isWeighted || !result.weight) return;
      const reps = parseInt(raw);
      if (isNaN(reps) || reps <= 0) return;
      previewEl.style.display = 'inline-flex';
      const curVol = result.weight * reps;
      previewEl.appendChild(h('span', { style: { fontSize: '14px', color: 'var(--text-muted)' } }, curVol + ' vol'));
      const lastVal = lastSets[setIdx];
      if (typeof lastVal === 'number' && lastData?.weight) {
        const lastVol = lastData.weight * lastVal;
        const delta = curVol - lastVol;
        const cls = delta > 0 ? 'up' : delta < 0 ? 'down' : 'eq';
        const txt = delta > 0 ? '\u2191 ' + delta : delta === 0 ? '= last' : '\u2193 ' + Math.abs(delta);
        previewEl.appendChild(h('span', { className: cls, style: { fontSize: '14px', fontWeight: 700 } }, txt));
      }
    }

    if (isTimed) {
      state.inputVal = initialStr;
      const inp = h('input', { className: 'input', type: 'text', inputMode: 'text',
        placeholder: 'e.g. 1m15s or 75',
        value: initialStr,
        style: { marginTop: '14px', textAlign: 'center', fontSize: '28px', fontFamily: 'var(--font-disp)' } });
      inp.addEventListener('input', (e) => { state.inputVal = e.target.value; });
      inp.addEventListener('keydown', (e) => { if (e.key === 'Enter' && state.inputVal) logSetAction(); });
      inp.addEventListener('focus', () => inp.select());
      block.appendChild(inp);
      setTimeout(() => inp.focus(), 50);
    } else {
      const startV = parseInt(initialStr);
      const initV = !isNaN(startV) ? startV : 0;
      state.inputVal = String(initV);
      const stepper = numStepper({
        value: initV, min: 0, max: 999, step: 1, bigStep: 5,
        onChange: (v) => { state.inputVal = String(v); updatePreview(state.inputVal); },
      });
      stepper.style.marginTop = '12px';
      block.appendChild(stepper);
    }

    block.appendChild(previewEl);
    updatePreview(state.inputVal);

    if (ex.bilateral) {
      block.appendChild(h('div', { style: { fontSize: '12px', color: 'var(--text-dim)', fontStyle: 'italic', marginTop: '10px' } },
        'Total both sides (e.g. 16 = 8L + 8R)'));
    }

    frag.appendChild(block);

    const btns = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px', marginTop: '22px' } });
    btns.appendChild(h('button', { className: 'btn btn-primary', onClick: logSetAction }, `Log set ${setIdx + 1}`));
    const row2 = h('div', { style: { display: 'flex', gap: '10px' } });
    row2.appendChild(h('button', { className: 'btn btn-ghost', style: { flex: 1 }, onClick: skipSetAction }, 'Skip set'));
    if (result.sets.length > 0) {
      row2.appendChild(h('button', { className: 'btn btn-ghost', style: { flex: 1 }, onClick: finishEarlyAction }, 'Done with exercise'));
    }
    btns.appendChild(row2);
    frag.appendChild(btns);
  }

  // Coming up next
  if (exIdx + 1 < exerciseList.length) {
    const nextEx = exerciseList[exIdx + 1];
    const nextHist = getExHistory(history, nextEx.name);
    const nextLast = nextHist.length > 0 ? nextHist[nextHist.length - 1] : null;

    const nextCard = h('div', { className: 'card-sm', style: {
      marginTop: '24px',
      opacity: '0.8',
    }});
    nextCard.appendChild(h('div', { className: 'eyebrow', style: { marginBottom: '6px' } }, 'Coming up next'));

    const nameRow = h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px' } });
    nameRow.appendChild(h('span', { style: { fontSize: '15px', fontWeight: 600, color: 'var(--text)' } }, nextEx.name));
    nameRow.appendChild(h('span', { className: `pill ${pillClass(nextEx.type)}` }, pillLabel(nextEx.type)));
    nextCard.appendChild(nameRow);

    if (nextLast) {
      const parts = [];
      if (nextLast.weight) parts.push(`${nextLast.weight} ${nextLast.weightUnit || 'lbs'}`);
      if (nextLast.sets?.length) parts.push(nextLast.sets.map(s => fmtVal(s, nextEx.type)).join(' / '));
      if (parts.length > 0) {
        nextCard.appendChild(h('div', { style: { fontSize: '13px', color: 'var(--text-dim)', marginTop: '6px' } }, parts.join(' · ')));
      }
    } else {
      nextCard.appendChild(h('div', { style: { fontSize: '13px', color: 'var(--text-dim)', marginTop: '6px' } }, 'No previous data'));
    }

    frag.appendChild(nextCard);
  }

  // Exercise manager toggle
  const managerBtn = h('button', { className: 'btn btn-ghost', style: { marginTop: '18px', fontSize: '14px' },
    onClick: () => setState({ showExerciseManager: !state.showExerciseManager }) },
    state.showExerciseManager ? 'Hide exercise list' : 'Edit exercise list');
  frag.appendChild(managerBtn);

  // Exercise manager section
  if (state.showExerciseManager) {
    const mgr = h('div', { style: { marginTop: '12px', display: 'flex', flexDirection: 'column', gap: '8px' } });
    exerciseList.forEach((mex, i) => {
      const isDone = i < exIdx;
      const isCurrent = i === exIdx;
      const isUpcoming = i > exIdx;
      const row = h('div', { 'data-reorder-row': '1', className: 'card-sm', style: {
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        background: isCurrent ? 'var(--jade-soft)' : 'var(--surface)',
        opacity: isDone ? '0.5' : '1',
      }});
      const left = h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', flex: 1, minWidth: 0 } });
      if (isUpcoming) {
        const handle = h('span', { style: { color: 'var(--text-dim)', cursor: 'grab', padding: '4px 2px 4px 0', flexShrink: 0, lineHeight: 1, userSelect: 'none', display: 'inline-flex', alignItems: 'center' } });
        handle.innerHTML = '<svg width="9" height="14" viewBox="0 0 9 14" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="1.2"/><circle cx="7" cy="2" r="1.2"/><circle cx="2" cy="7" r="1.2"/><circle cx="7" cy="7" r="1.2"/><circle cx="2" cy="12" r="1.2"/><circle cx="7" cy="12" r="1.2"/></svg>';
        attachDragHandle(handle, mgr, '[data-reorder-row]', i, (idx) => idx > exIdx, (from, to) => {
          const l = [...state.exerciseList]; const r = JSON.parse(JSON.stringify(state.results));
          const [mvL] = l.splice(from, 1); const [mvR] = r.splice(from, 1);
          l.splice(to, 0, mvL); r.splice(to, 0, mvR);
          setState({ exerciseList: l, results: r });
        });
        left.appendChild(handle);
      } else {
        left.appendChild(h('span', { style: { fontSize: '16px', color: 'transparent', padding: '0 4px 0 0', flexShrink: 0, lineHeight: 1 } }, '⠿'));
      }
      left.appendChild(h('span', { className: 'num', style: { fontSize: '14px', color: 'var(--text-dim)', width: '14px', flexShrink: 0 } }, String(i + 1)));
      left.appendChild(h('span', { style: { fontSize: '16px', fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: isCurrent ? 'var(--jade)' : 'var(--text)', flex: 1, minWidth: 0 } }, mex.name));
      left.appendChild(h('span', { className: `pill ${pillClass(mex.type)}` }, pillLabel(mex.type)));
      if (isCurrent) left.appendChild(h('span', { style: { fontSize: '11px', color: 'var(--jade)', fontWeight: 700, letterSpacing: '0.04em' } }, 'NOW'));
      row.appendChild(left);

      if (isUpcoming) {
        const controls = h('div', { style: { display: 'flex', gap: '2px', flexShrink: 0, marginLeft: '8px' } });
        controls.appendChild(h('button', { style: { background: 'none', border: 'none', color: 'var(--text-dim)', fontSize: '18px', padding: '4px 8px', fontFamily: 'var(--font-ui)', cursor: 'pointer' },
          onClick: () => {
            const l = state.exerciseList.filter((_, j) => j !== i);
            const r = state.results.filter((_, j) => j !== i);
            setState({ exerciseList: l, results: r });
          } }, '×'));
        row.appendChild(controls);
      }
      mgr.appendChild(row);
    });

    // Add exercise button (opens picker)
    mgr.appendChild(h('button', { className: 'btn btn-ghost', style: { marginTop: '8px', fontSize: '14px', borderStyle: 'dashed' }, onClick: () => {
      setState({ showExercisePicker: true, pickerContext: 'logging', pickerQuery: '', pickerCreating: false });
    }}, '+ Add exercise'));

    frag.appendChild(mgr);
  }

  if (state.showNotesSheet) frag.appendChild(renderNotesSheet());
  if (state.showExercisePicker) frag.appendChild(renderExercisePicker());

  return frag;
}

function confirmWeightAction() {
  const w = parseFloat(state.weight);
  if (isNaN(w) || w <= 0) return;
  const results = [...state.results];
  results[state.exIdx] = { ...results[state.exIdx], weight: w, weightUnit: state.weightUnit };
  setState({ results, weightConfirmed: true });
}

function logSetAction() {
  const { exIdx, setIdx, inputVal, exerciseList, results } = state;
  const ex = exerciseList[exIdx];
  let value;
  if (ex.type === 'timed') { value = parseTimeInput(inputVal); if (value === null) return; }
  else { value = parseInt(inputVal); if (isNaN(value) || value <= 0) return; }

  const newResults = JSON.parse(JSON.stringify(results));
  newResults[exIdx].sets.push(value);
  if (!newResults[exIdx].setWeights) newResults[exIdx].setWeights = [];
  newResults[exIdx].setWeights.push(newResults[exIdx].weight ?? null);

  if (setIdx + 1 < DEFAULT_SETS) {
    setState({ results: newResults, setIdx: setIdx + 1, inputVal: '' });
  } else {
    advanceExercise(newResults);
  }
}

function skipSetAction() {
  const newResults = JSON.parse(JSON.stringify(state.results));
  newResults[state.exIdx].sets.push('skip');
  if (!newResults[state.exIdx].setWeights) newResults[state.exIdx].setWeights = [];
  newResults[state.exIdx].setWeights.push(null);
  if (state.setIdx + 1 < DEFAULT_SETS) {
    setState({ results: newResults, setIdx: state.setIdx + 1, inputVal: '' });
  } else {
    advanceExercise(newResults);
  }
}

function finishEarlyAction() { advanceExercise(state.results); }

function advanceExercise(results) {
  if (state.exIdx + 1 < state.exerciseList.length) {
    setState({ results, exIdx: state.exIdx + 1, setIdx: 0, weight: '', weightUnit: 'lbs', weightConfirmed: false, inputVal: '' });
  } else {
    setState({ results, screen: 'review', workoutDate: null, showDatePicker: false });
  }
}

function undoAction() {
  const { exIdx, results, exerciseList } = state;
  const result = results[exIdx];

  // If weight was confirmed but no sets logged yet, un-confirm weight
  if (state.weightConfirmed && result.sets.length === 0) {
    setState({ weightConfirmed: false });
    return;
  }

  // If current exercise has logged sets, pop the last one
  if (result.sets.length > 0) {
    const newResults = JSON.parse(JSON.stringify(results));
    newResults[exIdx].sets.pop();
    if (newResults[exIdx].setWeights?.length) newResults[exIdx].setWeights.pop();
    const newSetIdx = newResults[exIdx].sets.length;
    setState({ results: newResults, setIdx: newSetIdx, inputVal: '' });
    return;
  }

  // No sets logged for current exercise, go back to previous exercise
  if (exIdx > 0) {
    const newResults = JSON.parse(JSON.stringify(results));
    if (newResults[exIdx - 1].sets.length > 0) {
      newResults[exIdx - 1].sets.pop();
      if (newResults[exIdx - 1].setWeights?.length) newResults[exIdx - 1].setWeights.pop();
    }
    const prevSets = newResults[exIdx - 1].sets;
    const prevEx = exerciseList[exIdx - 1];
    setState({
      results: newResults,
      exIdx: exIdx - 1,
      setIdx: prevSets.length,
      inputVal: '',
      weightConfirmed: prevEx.type !== 'weighted' || newResults[exIdx - 1].weight != null,
    });
    return;
  }

  // First exercise with no sets, go back to edit list
  setState({ screen: 'editList' });
}

// ─── REVIEW ───

  frag.appendChild(h('h1', { style: { fontSize: '32px', marginTop: '4px' } }, 'Review'));

  const selectedDate = state.workoutDate || todayStr;
  const isToday = selectedDate === todayStr;
  const dateRow = h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '18px' } });

    const label = isToday ? 'Today' : new Date(selectedDate + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    dateRow.appendChild(h('span', { style: { fontSize: '14px', color: isToday ? 'var(--text-muted)' : 'var(--jade)', fontWeight: isToday ? 500 : 700 } }, label));
    dateRow.appendChild(h('button', {
      style: { background: 'none', border: 'none', color: 'var(--text-dim)', fontSize: '14px', fontFamily: 'var(--font-ui)', cursor: 'pointer', padding: '0', textDecoration: 'underline' },
      onClick: () => setState({ showDatePicker: true })
    }, 'Change date'));
  } else {
    const dateInput = h('input', { type: 'date', style: { fontFamily: 'var(--font-ui)', fontSize: '14px', background: 'var(--surface-alt)', color: 'var(--text)', border: 'none', borderRadius: '10px', padding: '8px 12px' } });
    dateInput.value = selectedDate;
    dateInput.max = todayStr;
    dateInput.addEventListener('change', (e) => { setState({ workoutDate: e.target.value, showDatePicker: false }); });
    dateRow.appendChild(dateInput);
    dateRow.appendChild(h('button', {
      style: { background: 'none', border: 'none', color: 'var(--text-dim)', fontSize: '14px', fontFamily: 'var(--font-ui)', cursor: 'pointer', padding: '0' },
      onClick: () => setState({ showDatePicker: false })
    }, 'Cancel'));
  }
  frag.appendChild(dateRow);

  const list = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px', marginBottom: '16px' } });
  state.results.forEach((ex, eIdx) => {
    const hist = getExHistory(state.history, ex.name);
    const lastData = hist.length > 0 ? hist[hist.length - 1] : null;
    const lastSets = lastData?.sets || [];

    const card = h('div', { className: 'card-sm' });
    const header = h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '12px', flexWrap: 'wrap' } });
    header.appendChild(h('span', { style: { fontSize: '16px', fontWeight: 600, color: 'var(--text)' } }, ex.name));
    header.appendChild(h('span', { className: `pill ${pillClass(ex.type)}` }, pillLabel(ex.type)));
    const exSetWeights = ex.setWeights || [];
    const uniqExW = exSetWeights.filter(w => w != null).filter((w, i, a) => a.indexOf(w) === i);
    const variedW = uniqExW.length > 1;
    if (ex.weight && !variedW) header.appendChild(h('span', { style: { fontSize: '13px', color: 'var(--text-muted)' } }, `@ ${ex.weight} ${ex.weightUnit}`));
    card.appendChild(header);

    const setsRow = h('div', { style: { display: 'flex', gap: '8px' } });
    ex.sets.forEach((s, sIdx) => {
      const isSkip = s === 'skip';
      const btn = h('button', {
        className: isSkip ? 'set-box set-box-skip' : 'set-box',
        style: { cursor: isSkip ? 'default' : 'pointer', fontFamily: 'var(--font-ui)', color: 'var(--text)' },
        onClick: () => {
          if (isSkip) return;
          const newVal = prompt(`Set ${sIdx + 1} (${ex.type === 'timed' ? 'time e.g. 1m15s' : 'reps'}):`, ex.type === 'timed' ? formatTime(s) : String(s));
          if (!newVal) return;
          let parsed;
          if (ex.type === 'timed') { parsed = parseTimeInput(newVal); } else { parsed = parseInt(newVal); }
          if (parsed && parsed > 0) {
            const newResults = JSON.parse(JSON.stringify(state.results));
            newResults[eIdx].sets[sIdx] = parsed;
            setState({ results: newResults });
          }
        }
      });
      btn.appendChild(h('div', { className: 'num', style: { fontSize: '22px', color: isSkip ? 'var(--warn)' : 'var(--text)' } }, fmtVal(s, ex.type)));
      btn.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-dim)', marginTop: '4px' } }, `Set ${sIdx + 1}`));
      if (variedW && exSetWeights[sIdx] != null && !isSkip) {
        btn.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-muted)', marginTop: '2px', fontWeight: 600 } }, `${exSetWeights[sIdx]} ${ex.weightUnit}`));
      }

      const lastVal = lastSets[sIdx];
      const setWeight = exSetWeights[sIdx] != null ? exSetWeights[sIdx] : ex.weight;
      const d = buildDelta(s, setWeight, lastVal, lastData?.weight, ex.type);
      if (d) btn.appendChild(h('div', { style: { fontSize: '11px', color: d.color, marginTop: '2px', fontWeight: 600 } }, d.text));

      setsRow.appendChild(btn);
    });
    card.appendChild(setsRow);
    list.appendChild(card);
  });

  frag.appendChild(h('div', { style: { fontSize: '12px', color: 'var(--text-dim)', textAlign: 'center', marginBottom: '16px' } }, 'Tap any value to edit · skipped sets stay as-is'));

  frag.appendChild(h('div', { className: 'eyebrow' }, 'Session notes (optional)'));
  const ta = h('textarea', { className: 'textarea', placeholder: 'Anything to remember for next time…' });
  ta.value = state.notes;
  ta.addEventListener('input', (e) => { state.notes = e.target.value; });
  frag.appendChild(ta);

  frag.appendChild(h('div', { style: { height: '16px' } }));

  frag.appendChild(h('button', { className: 'btn btn-primary', onClick: async () => {
    const todayIso = new Date().toISOString().slice(0, 10);
    const pickedDate = state.workoutDate;
    const date = (pickedDate && pickedDate !== todayIso)
      ? new Date(pickedDate + 'T12:00:00').toISOString()
      : new Date().toISOString();
    const workout = {
      date,
      workoutType: state.workoutType,
      notes: state.notes || '',
      exercises: state.results,
    };
    await addWorkout(workout);
    const history = await getAllWorkouts();
    setState({ history, screen: 'home', workoutType: null, exerciseList: [], results: [], notes: '', workoutDate: null, showDatePicker: false });
  }}, 'Save workout'));

  return frag;
}

// ─── WORKOUT DETAIL (read-only summary) ───
function renderWorkoutDetail() {
  const w = state.viewingWorkout;
  const frag = h('div', { className: 'fade-in' });
  const backScreen = state.viewingWorkoutFrom || 'home';

  frag.appendChild(h('button', { className: 'back-btn', onClick: () => setState({ screen: backScreen }) }, '← Back'));
  frag.appendChild(h('h1', { style: { fontSize: '36px', marginTop: '4px' } }, w.workoutType));
  const d = new Date(w.date);
  frag.appendChild(h('p', { style: { color: 'var(--text-muted)', fontSize: '15px', margin: '8px 0 18px' } },
    d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' })));

  if (w.notes) {
    const noteBox = h('div', { className: 'card-sm', style: { background: 'rgba(95,211,168,0.08)', marginBottom: '18px' } });
    noteBox.appendChild(h('div', { className: 'eyebrow', style: { color: 'var(--jade)' } }, 'Session note'));
    noteBox.appendChild(h('div', { style: { fontSize: '15px', color: 'var(--text)', marginTop: '6px' } }, w.notes));
    frag.appendChild(noteBox);
  }

  const wDate = new Date(w.date);
  const list = h('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px' } });
  w.exercises.forEach(ex => {
    const prevEx = state.history
      .filter(hw => new Date(hw.date) < wDate)
      .flatMap(hw => hw.exercises.filter(e => e.name === ex.name))
      .pop();
    const prevSets = prevEx?.sets || [];

    const card = h('div', { className: 'card-sm' });
    const header = h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '12px', flexWrap: 'wrap' } });
    header.appendChild(h('span', { style: { fontSize: '16px', fontWeight: 600, color: 'var(--text)' } }, ex.name));
    header.appendChild(h('span', { className: `pill ${pillClass(ex.type)}` }, pillLabel(ex.type)));
    const setWeights = ex.setWeights || [];
    const uniqueWeights = setWeights.filter(w => w != null).filter((w, i, a) => a.indexOf(w) === i);
    const varied = uniqueWeights.length > 1;
    if (ex.weight && !varied) header.appendChild(h('span', { style: { fontSize: '13px', color: 'var(--text-muted)' } }, `@ ${ex.weight} ${ex.weightUnit}`));
    card.appendChild(header);

    const setsRow = h('div', { style: { display: 'flex', gap: '8px' } });
    ex.sets.forEach((s, sIdx) => {
      const isSkip = s === 'skip';
      const setBox = h('div', { className: isSkip ? 'set-box set-box-skip' : 'set-box' });
      setBox.appendChild(h('div', { className: 'num', style: { fontSize: '22px', color: isSkip ? 'var(--warn)' : 'var(--text)' } }, fmtVal(s, ex.type)));
      setBox.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-dim)', marginTop: '4px' } }, `Set ${sIdx + 1}`));
      if (varied && setWeights[sIdx] != null && !isSkip) {
        setBox.appendChild(h('div', { style: { fontSize: '11px', color: 'var(--text-muted)', marginTop: '2px', fontWeight: 600 } }, `${setWeights[sIdx]} ${ex.weightUnit}`));
      }
      const lastVal = prevSets[sIdx];
      if (typeof s === 'number' && typeof lastVal === 'number') {
        const delta = s - lastVal;
        const deltaColor = delta > 0 ? 'var(--jade)' : delta < 0 ? 'var(--coral)' : 'var(--text-muted)';
        const deltaText = delta > 0 ? `+${delta}` : delta === 0 ? '=' : String(delta);
        setBox.appendChild(h('div', { style: { fontSize: '11px', color: deltaColor, marginTop: '2px', fontWeight: 600 } }, deltaText));
      }
      setsRow.appendChild(setBox);
    });
    card.appendChild(setsRow);
    list.appendChild(card);
  });
  frag.appendChild(list);

  return frag;
}
